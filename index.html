/* ================================================================
   WEBXR — REAL HAND TRACKING
   ================================================================ */
class HandTracker {
  constructor(session, refSpace) {
    this.session    = session;
    this.refSpace   = refSpace;
    this.pinch      = { left:false, right:false };
    this.THRESHOLD  = 0.025; // 25mm pinch distance
    this.cursors    = {
      right: document.getElementById('cursor-right'),
      left:  document.getElementById('cursor-left'),
    };
    // Track pointer capture target for drag simulation
    this.pointerTarget = { left:null, right:null };
    this.lastPos       = { left:null, right:null };
  }

  update(frame) {
    let anyHandVisible = false;
    for (const inputSource of this.session.inputSources) {
      if (!inputSource.hand) continue;
      anyHandVisible = true;
      const h = inputSource.handedness; // 'left' or 'right'
      this.processHand(frame, inputSource.hand, h);
    }
    // Hide cursors if no hands visible
    if (!anyHandVisible) {
      this.cursors.left.style.display  = 'none';
      this.cursors.right.style.display = 'none';
    }
  }

  processHand(frame, hand, handedness) {
    const indexJoint = hand.get('index-finger-tip');
    const thumbJoint = hand.get('thumb-tip');
    if (!indexJoint || !thumbJoint) return;

    const indexPose = frame.getJointPose(indexJoint, this.refSpace);
    const thumbPose = frame.getJointPose(thumbJoint, this.refSpace);
    if (!indexPose || !thumbPose) return;

    // Calculate pinch distance in metres
    const dist      = this.distance3D(indexPose.transform.position, thumbPose.transform.position);
    const isPinching = dist < this.THRESHOLD;

    // Project index fingertip to screen
    const screenPos = this.projectJointToScreen(frame, indexPose.transform.position);
    if (!screenPos) return;

    // Update cursor element
    const cursor = this.cursors[handedness];
    cursor.style.display = '';
    cursor.style.left    = `${screenPos.x}px`;
    cursor.style.top     = `${screenPos.y}px`;
    cursor.classList.toggle('pinching', isPinching);

    // Fire pointer events based on state change
    const wasPinching = this.pinch[handedness];
    this.pinch[handedness] = isPinching;

    // Pointer move always fires
    this.firePointerEvent('pointermove', screenPos, isPinching ? 1 : 0, handedness);

    if (isPinching && !wasPinching) {
      // Pinch start → pointerdown + click
      this.firePointerEvent('pointerdown', screenPos, 1, handedness);
    } else if (!isPinching && wasPinching) {
      // Pinch release → pointerup + click
      this.firePointerEvent('pointerup', screenPos, 0, handedness);
      this.firePointerEvent('click',     screenPos, 0, handedness);
    }
    this.lastPos[handedness] = screenPos;
  }

  distance3D(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
    return Math.sqrt(dx*dx + dy*dy + dz*dz);
  }

  projectJointToScreen(frame, position) {
    const viewerPose = frame.getViewerPose(this.refSpace);
    if (!viewerPose || !viewerPose.views.length) return null;

    // Use primary view for projection
    const view = viewerPose.views[0];
    const vm   = view.transform.inverse.matrix;
    const pm   = view.projectionMatrix;
    const x = position.x, y = position.y, z = position.z;

    // Apply view matrix (column-major)
    const vx = vm[0]*x + vm[4]*y + vm[8]*z  + vm[12];
    const vy = vm[1]*x + vm[5]*y + vm[9]*z  + vm[13];
    const vz = vm[2]*x + vm[6]*y + vm[10]*z + vm[14];
    const vw = vm[3]*x + vm[7]*y + vm[11]*z + vm[15];

    // Apply projection matrix
    const cx = pm[0]*vx + pm[4]*vy + pm[8]*vz  + pm[12]*vw;
    const cy = pm[1]*vx + pm[5]*vy + pm[9]*vz  + pm[13]*vw;
    const cw = pm[3]*vx + pm[7]*vy + pm[11]*vz + pm[15]*vw;

    if (Math.abs(cw) < 0.0001) return null;

    // NDC → screen pixels
    const ndcX = cx / cw;
    const ndcY = cy / cw;
    return {
      x: (ndcX + 1) * 0.5 * window.innerWidth,
      y: (1 - ndcY) * 0.5 * window.innerHeight,
    };
  }

  firePointerEvent(type, pos, buttons, handedness) {
    const el = document.elementFromPoint(pos.x, pos.y);
    if (!el) return;
    const event = new PointerEvent(type, {
      bubbles:     true,
      cancelable:  true,
      clientX:     pos.x,
      clientY:     pos.y,
      pointerId:   handedness==='right' ? 20 : 21, // distinct IDs per hand
      pointerType: 'hand',
      buttons,
      isPrimary:   handedness === 'right',
    });
    el.dispatchEvent(event);
  }
}

/* WebXR Session Init */
async function initXR() {
  if (!navigator.xr) { log('WebXR not supported.', 'error'); return; }

  const supported = await navigator.xr.isSessionSupported('immersive-ar');
  if (!supported) { log('Immersive AR not supported on this device.', 'error'); return; }

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['dom-overlay'],
      optionalFeatures: ['local-floor', 'hand-tracking'],
      domOverlay:       { root: document.body },
    });

    xrSession.addEventListener('end', onXREnd);
    xrSession.addEventListener('inputsourceschange', onInputSourcesChange);

    // Init WebGL context for transparent pass-through
    // xrCompatible:true is set at context creation — no makeXRCompatible() needed
    const canvas = document.getElementById('xr-canvas');
    xrGlCtx = canvas.getContext('webgl2', { alpha:true, xrCompatible:true })
           || canvas.getContext('webgl',  { alpha:true, xrCompatible:true });
    xrSession.updateRenderState({ baseLayer: new XRWebGLLayer(xrSession, xrGlCtx, { alpha:true }) });

    // Try floor-level reference space, fall back to local if unavailable
    try {
      xrRefSpace = await xrSession.requestReferenceSpace('local-floor');
    } catch {
      xrRefSpace = await xrSession.requestReferenceSpace('local');
      log('Floor tracking unavailable, using local space.', 'warn');
    }

    // Init hand tracker
    handTracker = new HandTracker(xrSession, xrRefSpace);

    xrSession.requestAnimationFrame(onXRFrame);

    // Apply XR visual classes
    document.documentElement.classList.add('xr-active');
    document.body.classList.add('xr-active');
    document.getElementById('workspace').classList.add('xr-active');

    const btn = document.getElementById('btn-xr');
    btn.classList.add('xr-active-btn');

    log('Entered WebXR. Hand tracking active — pinch to interact.', 'info');
  } catch (err) {
    log(`XR failed: ${err.message}`, 'error');
  }
}

function onXREnd() {
  xrSession   = null;
  xrRefSpace  = null;
  handTracker = null;
  document.documentElement.classList.remove('xr-active');
  document.body.classList.remove('xr-active');
  document.getElementById('workspace').classList.remove('xr-active');
  document.getElementById('btn-xr').classList.remove('xr-active-btn');
  document.getElementById('cursor-right').style.display = 'none';
  document.getElementById('cursor-left').style.display  = 'none';
  log('Exited WebXR.', 'info');
}

function onXRFrame(time, frame) {
  if (!xrSession) return;
  xrSession.requestAnimationFrame(onXRFrame);

  // Clear background fully transparent for passthrough
  xrGlCtx.clearColor(0,0,0,0);
  xrGlCtx.clear(xrGlCtx.COLOR_BUFFER_BIT | xrGlCtx.DEPTH_BUFFER_BIT);

  // Process hand tracking every frame
  if (handTracker) handTracker.update(frame);
}

function onInputSourcesChange(e) {
  for (const src of e.added) {
    if (src.hand) {
      log(`${src.handedness} hand detected.`, 'info');
    }
  }
  for (const src of e.removed) {
    if (src.hand) {
      const cursor = document.getElementById(`cursor-${src.handedness}`);
      if (cursor) cursor.style.display='none';
    }
  }
}

window.toggleXR = () => {
  if (xrSession) xrSession.end();
  else initXR();
};

// Dim XR button if not supported
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-ar').then(supported => {
    if (!supported) document.getElementById('btn-xr').style.opacity = '0.4';
  });
} else {
  document.getElementById('btn-xr').style.opacity = '0.4';
}

/* ================================================================
   INTERVALS
   ================================================================ */
// Switch MAC table refresh
setInterval(() => {
  if (selectedId && devices[selectedId]?.type === 'Switch') renderProps();
}, 5000);

// RIP broadcast
setInterval(() => {
  for (const dev of Object.values(devices).filter(d => d.type==='Router' && d.ripEnabled)) {
    dev.updateConnectedRoutes();
    if (!dev.routingTable.length) continue;
    dev.ripBroadcastCount++;
    const silent = dev.ripBroadcastCount > 3;
    for (const iface of Object.values(dev.interfaces)) {
      if (iface.ip!=='0.0.0.0' && iface.adminState==='up' && iface.connectedLink) {
        transmit({ sourceMac:iface.mac, destMac:'01:00:5E:00:00:09',
          payload:{ type:'RIP_UPDATE', sourceIp:iface.ip, routes:dev.routingTable }, ttl:1, silent
        }, dev.id, iface.id);
      }
    }
  }
}, 10000);

/* ================================================================
   INIT
   ================================================================ */
setMode('select');
renderNodes();
</script>
</body>
