<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NetSim XR — Network Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       DESIGN SYSTEM — Industrial Terminal / Holographic NOC
       ============================================================ */
    :root {
      --bg-base:       #050a0f;
      --bg-panel:      rgba(6, 14, 22, 0.96);
      --bg-panel-head: rgba(0, 20, 35, 0.98);
      --border:        rgba(0, 210, 255, 0.2);
      --border-bright: rgba(0, 210, 255, 0.6);
      --cyan:          #00d2ff;
      --cyan-dim:      rgba(0, 210, 255, 0.08);
      --green:         #00ff88;
      --green-dim:     rgba(0, 255, 136, 0.08);
      --amber:         #ffb300;
      --red:           #ff4455;
      --text:          #c8dce8;
      --text-dim:      #4a6070;
      --text-bright:   #e8f4ff;
      --mono:          'Share Tech Mono', monospace;
      --ui:            'Rajdhani', sans-serif;
      --xr-scale:      1;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-base);
      color: var(--text);
      font-family: var(--ui);
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ============================================================
       WORKSPACE
       ============================================================ */
    #workspace {
      position: absolute; inset: 0;
      background-color: var(--bg-base);
      background-image:
        radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.03) 0%, transparent 60%),
        radial-gradient(rgba(0, 210, 255, 0.15) 1px, transparent 1px);
      background-size: 100% 100%, 28px 28px;
      background-position: center, 0px 0px;
      transition: background-position 0s;
      cursor: crosshair;
    }
    #workspace.mode-select   { cursor: default; }
    #workspace.mode-addCable { cursor: cell; }
    #workspace.mode-addText  { cursor: text; }

    #network-layer {
      position: absolute; inset: 0;
      pointer-events: none;
      transform: translate(0, 0);
      will-change: transform;
    }

    #cables { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    #nodes  { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

    /* ============================================================
       SIDEBAR
       ============================================================ */
    #sidebar {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 68px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 0;
      z-index: 30;
      gap: 4px;
    }

    .sb-logo {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--cyan);
      letter-spacing: 2px;
      text-align: center;
      padding: 6px 0 10px;
      border-bottom: 1px solid var(--border);
      width: 100%;
      line-height: 1.5;
    }

    .sb-btn {
      width: 48px; height: 48px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-dim);
      background: transparent;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .sb-btn:hover { color: var(--cyan); border-color: var(--border); background: var(--cyan-dim); }
    .sb-btn.active { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-dim); box-shadow: 0 0 12px rgba(0,210,255,0.2); }
    .sb-btn svg { flex-shrink: 0; }

    .sb-divider { width: 40px; height: 1px; background: var(--border); margin: 4px 0; }

    .sb-device {
      width: 48px; height: 48px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: grab;
      transition: all 0.15s;
      color: var(--text-dim);
      background: transparent;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      touch-action: none;
    }
    .sb-device:hover { color: var(--green); border-color: var(--green); background: var(--green-dim); }
    .sb-device:active { cursor: grabbing; }

    .sb-spacer { flex: 1; }

    /* ============================================================
       FLOATING PANELS
       ============================================================ */
    .panel {
      position: absolute;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      z-index: 40;
      min-width: 280px;
      touch-action: auto;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0,210,255,0.05);
    }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-panel-head);
      border-bottom: 1px solid var(--border);
      cursor: grab;
      touch-action: none;
    }
    .panel-head:active { cursor: grabbing; }
    .panel-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      display: flex; align-items: center; gap: 6px;
      pointer-events: none;
    }
    .panel-title-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .panel-close {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      border: none; background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      pointer-events: auto;
    }
    .panel-close:hover { color: var(--red); background: rgba(255,68,85,0.1); }

    /* Console */
    #panel-console { top: 80px; left: 82px; width: 320px; }
    #console-body {
      height: 120px;
      overflow-y: auto;
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
      color: var(--green);
    }
    #console-body .log-warn  { color: var(--amber); }
    #console-body .log-error { color: var(--red); }
    #console-body .log-info  { color: var(--text-dim); }
    .console-toggle-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; transition: color 0.15s; padding: 4px; }
    .console-toggle-btn:hover { color: var(--cyan); }

    /* Ping */
    #panel-ping { top: 80px; right: 16px; width: 300px; }
    .panel-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }

    /* Properties */
    #panel-props { top: 240px; right: 16px; width: 320px; max-height: calc(100vh - 260px); }
    #props-scroll { overflow-y: auto; padding: 14px; max-height: calc(100vh - 340px); pointer-events: auto; }

    /* Port selector */
    #port-selector {
      position: absolute;
      background: var(--bg-panel);
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      z-index: 60;
      overflow: hidden;
      min-width: 130px;
      pointer-events: auto;
      box-shadow: 0 0 30px rgba(0,210,255,0.15);
    }
    .port-selector-title {
      padding: 7px 12px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--cyan);
      background: var(--bg-panel-head);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }
    .port-option {
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.1s;
    }
    .port-option:hover { background: var(--cyan-dim); color: var(--cyan); }

    /* ============================================================
       BOTTOM TOOLBAR
       ============================================================ */
    #bottom-bar {
      position: absolute; bottom: 20px; left: 82px;
      display: flex; align-items: center; gap: 6px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      z-index: 30;
      pointer-events: auto;
    }
    .bar-btn {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-dim);
      background: transparent;
    }
    .bar-btn:hover { color: var(--cyan); border-color: var(--border); background: var(--cyan-dim); }
    .bar-btn.active { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-dim); }
    .bar-btn.xr-active-btn { color: var(--green); border-color: var(--green); background: var(--green-dim); box-shadow: 0 0 16px rgba(0,255,136,0.2); }
    .bar-divider { width: 1px; height: 24px; background: var(--border); }

    /* STP button */
    #btn-stp {
      position: absolute; top: 20px; left: 92px;
      padding: 8px 14px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-dim);
      cursor: pointer;
      z-index: 30;
      transition: all 0.15s;
      pointer-events: auto;
    }
    #btn-stp:hover { border-color: var(--border-bright); color: var(--text); }
    #btn-stp.stp-on { color: var(--green); border-color: var(--green); background: var(--green-dim); }

    /* ============================================================
       FORM ELEMENTS
       ============================================================ */
    .field-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .field-input {
      width: 100%;
      padding: 8px 10px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-bright);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: var(--cyan); }
    .field-select {
      width: 100%;
      padding: 8px 10px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-bright);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .field-select:focus { border-color: var(--cyan); }

    .btn-primary {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--cyan);
      border-radius: 6px;
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary:hover { background: var(--cyan-dim); box-shadow: 0 0 12px rgba(0,210,255,0.15); }
    .btn-primary.success { color: var(--green); border-color: var(--green); background: var(--green-dim); }
    .btn-danger {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--red);
      border-radius: 6px;
      color: var(--red);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-danger:hover { background: rgba(255,68,85,0.1); }

    .field-toggle { display: flex; align-items: center; gap: 10px; }
    .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 2px; top: 2px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: all 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--green-dim); border-color: var(--green); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); background: var(--green); }

    .props-section { margin-bottom: 14px; }
    .props-section-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .props-row { margin-bottom: 8px; }
    .props-kv {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(0,210,255,0.06);
      font-family: var(--mono);
      font-size: 11px;
    }
    .props-kv .k { color: var(--text-dim); }
    .props-kv .v { color: var(--text-bright); font-size: 10px; }

    /* ============================================================
       DEVICE NODES
       ============================================================ */
    .device-node {
      position: absolute;
      width: 80px; height: 80px;
      margin-left: -40px; margin-top: -40px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px;
      cursor: pointer;
      touch-action: none;
      pointer-events: auto;
    }
    .node-icon {
      width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(5,10,15,0.9);
      transition: all 0.15s;
      position: relative;
    }
    .device-node:hover .node-icon { border-color: var(--border-bright); box-shadow: 0 0 14px rgba(0,210,255,0.2); }
    .device-node.selected .node-icon { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,210,255,0.4); }
    .device-node.pending .node-icon { border-color: var(--amber); box-shadow: 0 0 16px rgba(255,179,0,0.4); animation: pulse-amber 1s infinite; }
    @keyframes pulse-amber { 0%,100% { box-shadow: 0 0 12px rgba(255,179,0,0.3); } 50% { box-shadow: 0 0 24px rgba(255,179,0,0.6); } }

    .node-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      white-space: nowrap;
      pointer-events: none;
    }
    .device-node:hover .node-label, .device-node.selected .node-label { color: var(--cyan); }

    .node-badge {
      position: absolute;
      top: -5px; right: -5px;
      min-width: 14px; height: 14px;
      border-radius: 7px;
      font-family: var(--mono);
      font-size: 8px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 3px;
      pointer-events: none;
    }

    .text-label-node {
      position: absolute;
      pointer-events: auto;
      cursor: move;
      touch-action: none;
      font-family: var(--ui);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .text-label-node:hover { color: var(--cyan); }
    .text-label-node.selected { color: var(--cyan); outline: 1px dashed var(--border); }

    /* AP radius ring */
    .ap-radius {
      position: absolute;
      border-radius: 50%;
      border: 1px dashed rgba(0, 210, 255, 0.2);
      background: radial-gradient(circle, rgba(0,210,255,0.03) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse-ring 4s ease-in-out infinite;
      transform: translate(-50%, -50%);
      top: 50%; left: 50%;
    }
    @keyframes pulse-ring { 0%,100% { opacity:0.5; } 50% { opacity:1; } }

    /* Drag ghost */
    #drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.8;
      transform: translate(-50%, -50%);
      background: var(--bg-panel);
      border: 1px solid var(--green);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--green);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      box-shadow: 0 0 24px rgba(0,255,136,0.2);
      display: none;
    }

    /* ============================================================
       HAND TRACKING CURSORS (VR)
       ============================================================ */
    .hand-cursor {
      position: fixed;
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--cyan);
      background: rgba(0,210,255,0.2);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      display: none;
      transition: background 0.1s, border-color 0.1s;
      box-shadow: 0 0 10px rgba(0,210,255,0.5);
    }
    .hand-cursor.pinching {
      background: rgba(0,210,255,0.5);
      border-color: var(--green);
      box-shadow: 0 0 16px rgba(0,255,136,0.6);
      transform: translate(-50%, -50%) scale(0.7);
    }
    .hand-cursor.left-hand  { border-color: var(--amber); box-shadow: 0 0 10px rgba(255,179,0,0.5); }
    .hand-cursor.left-hand.pinching { border-color: var(--amber); background: rgba(255,179,0,0.4); }

    /* ============================================================
       XR ACTIVE — Compositor Fixes
       ============================================================ */
    html.xr-active, body.xr-active { background: transparent !important; }
    #workspace.xr-active { background-color: transparent !important; }
    .xr-active #sidebar { background: rgba(5, 12, 20, 0.97) !important; }

    body.xr-active * {
      box-shadow: none !important;
      filter: none !important;
      backdrop-filter: none !important;
    }
    body.xr-active #cables { overflow: hidden !important; }

    /* XR scale for readability at arm's length */
    body.xr-active {
      --xr-scale: 1.4;
    }
    body.xr-active #sidebar       { transform: scale(var(--xr-scale)); transform-origin: top left; }
    body.xr-active .panel         { transform: scale(var(--xr-scale)); transform-origin: top right; }
    body.xr-active #btn-stp       { transform: scale(var(--xr-scale)); transform-origin: top left; }
    body.xr-active #bottom-bar    { transform: scale(var(--xr-scale)); transform-origin: bottom left; }

    /* ============================================================
       SUCCESS TICK ANIMATION
       ============================================================ */
    .success-tick {
      position: absolute;
      pointer-events: none;
      z-index: 50;
      font-size: 18px;
      color: var(--green);
      font-family: var(--mono);
      text-shadow: 0 0 10px var(--green);
      animation: floatUp 1.2s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { opacity:1; transform: translateY(0); }
      100% { opacity:0; transform: translateY(-40px); }
    }

    /* WebXR canvas (background pass-through layer) */
    #xr-canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
  </style>
</head>
<body>

  <!-- WebXR pass-through canvas -->
  <canvas id="xr-canvas"></canvas>

  <!-- Hand tracking cursors (DOM Overlay) -->
  <div id="cursor-right" class="hand-cursor"></div>
  <div id="cursor-left"  class="hand-cursor left-hand"></div>

  <!-- Drag ghost -->
  <div id="drag-ghost"></div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-logo">NET<br>SIM<br>XR</div>

    <button class="sb-btn active" id="btn-select" onclick="setMode('select')" title="Select / Move">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="m13 13 6 6"/></svg>
      sel
    </button>
    <button class="sb-btn" id="btn-addCable" onclick="setMode('addCable')" title="Connect Devices">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      link
    </button>

    <div class="sb-divider"></div>

    <div class="sb-device" onpointerdown="startDrag(event,'PC',this)" title="Drag to add PC">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="8" x="5" y="2" rx="2"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h2"/><path d="M12 18h6"/></svg>
      pc
    </div>
    <div class="sb-device" onpointerdown="startDrag(event,'Switch',this)" title="Drag to add Switch">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h.01M10 12h.01M14 12h.01M18 12h.01"/></svg>
      sw
    </div>
    <div class="sb-device" onpointerdown="startDrag(event,'Router',this)" title="Drag to add Router">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m12 8-4 4h8l-4-4Z"/><path d="m12 16 4-4H8l4 4Z"/></svg>
      rtr
    </div>
    <div class="sb-device" onpointerdown="startDrag(event,'AP',this)" title="Drag to add Access Point">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h.01"/><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/></svg>
      ap

<script>
/* ================================================================
   STATE
   ================================================================ */
let devices = {};
let links   = {};
let labels  = {};
let counter = { PC:1, Switch:1, Router:1, AP:1, Laptop:1 };

let mode             = 'select';
let selectedId       = null;
let selectedLabelId  = null;
let pendingSrc       = null;
let pendingSrcPort   = null;
let stpEnabled       = false;
let panX = 0, panY = 0;
let panTotal = 0;
let isPanning        = false;
let panLastX = 0, panLastY = 0;

// Drag state
let dragType  = null;
let dragGhost = null;
let dragInfo  = null;

// Panel drag
let activePanel    = null;
let panelOffset    = { x:0, y:0 };
let maxZ           = 40;

// Cable drawing
let cableMouseX = 0, cableMouseY = 0;

// XR
let xrSession    = null;
let xrRefSpace   = null;
let xrGlCtx      = null;
let handTracker  = null;

const SVG_NS  = 'http://www.w3.org/2000/svg';
const WS      = document.getElementById('workspace');
const LAYER   = document.getElementById('network-layer');
const CABLES  = document.getElementById('cables');
const NODES   = document.getElementById('nodes');
const CONSOLE_BODY = document.getElementById('console-body');

/* ================================================================
   UTILITIES
   ================================================================ */
const uid  = () => 'id-' + Math.random().toString(36).substr(2,9);
const mac  = () => 'XX:XX:XX:XX:XX:XX'.replace(/X/g, () => '0123456789ABCDEF'[Math.floor(Math.random()*16)]);
const sleep = ms => new Promise(r => setTimeout(r, ms));

function log(msg, type='success') {
  const div = document.createElement('div');
  div.textContent = '> ' + msg;
  if (type === 'error')   div.className = 'log-error';
  else if (type === 'warn') div.className = 'log-warn';
  else if (type === 'info') div.className = 'log-info';
  CONSOLE_BODY.appendChild(div);
  CONSOLE_BODY.scrollTop = CONSOLE_BODY.scrollHeight;
}

const ipToInt  = ip => ip.split('.').reduce((a,o) => (a << 8) + parseInt(o,10), 0) >>> 0;
const intToIp  = n => `${(n>>>24)&255}.${(n>>>16)&255}.${(n>>>8)&255}.${n&255}`;
const network  = (ip,mask) => intToIp(ipToInt(ip) & ipToInt(mask));
const prefixLen = mask => ipToInt(mask).toString(2).split('1').length - 1;
const sameNet  = (a,b,m) => { try { return (ipToInt(a)&ipToInt(m))===(ipToInt(b)&ipToInt(m)); } catch { return false; } };

function triggerHaptic(intensity=0.5, duration=40) {
  try {
    for (const gp of navigator.getGamepads()) {
      if (gp?.vibrationActuator) {
        gp.vibrationActuator.playEffect('dual-rumble', {
          startDelay:0, duration, weakMagnitude:intensity, strongMagnitude:intensity
        }).catch(()=>{});
      }
    }
  } catch {}
}

/* ================================================================
   NETWORK CLASSES
   ================================================================ */
class Device {
  constructor(type, x, y) {
    this.id   = uid();
    this.type = type;
    this.name = `${type}${counter[type]++}`;
    this.mac  = mac();
    this.x    = x;
    this.y    = y;
  }
}

class PC extends Device {
  constructor(x, y) {
    super('PC', x, y);
    this.ip      = '0.0.0.0';
    this.subnet  = '255.255.255.0';
    this.gateway = '0.0.0.0';
    this.port    = null;
    this.arpCache = {};
  }

  async receive(frame, inPort) {
    if (frame.destMac !== this.mac && frame.destMac !== 'FF:FF:FF:FF:FF:FF') return;
    const p = frame.payload;

    if (p.type === 'ARP_REQ' && p.targetIp === this.ip) {
      await sleep(100);
      transmit({ sourceMac:this.mac, destMac:frame.sourceMac,
        payload:{ type:'ARP_REP', sourceIp:this.ip, targetIp:p.sourceIp, targetMac:frame.sourceMac }
      }, this.id, 1);
    }
    else if (p.type === 'ARP_REP' && p.targetIp === this.ip) {
      this.arpCache[p.sourceIp] = frame.sourceMac;
      renderProps();
      document.dispatchEvent(new CustomEvent('arp_resolved', { detail:{ ip:p.sourceIp, mac:frame.sourceMac } }));
    }
    else if (p.type === 'ICMP_REQ' && p.targetIp === this.ip) {
      await sleep(100);
      transmit({ sourceMac:this.mac, destMac:frame.sourceMac,
        payload:{ type:'ICMP_REP', sourceIp:this.ip, targetIp:p.sourceIp }
      }, this.id, 1);
    }
    else if (p.type === 'ICMP_REP' && p.targetIp === this.ip) {
      log(`[${this.name}] Reply from ${p.sourceIp}: bytes=32 time=1ms TTL=64`);
      document.dispatchEvent(new Event('icmp_replied'));
    }
  }
}

class Laptop extends PC {
  constructor(x, y) {
    super(x, y);
    this.type        = 'Laptop';
    this.name        = `Laptop${counter.Laptop++}`;
    this.ssid        = '';
    this.password    = '';
    this.connectedAp = null;
  }
}

class Switch extends Device {
  constructor(x, y) {
    super('Switch', x, y);
    this.ports = Array.from({ length:8 }, (_,i) => ({
      id: i+1, connectedLink:null, stpState:'forwarding', adminState:'up'
    }));
    this.macTable = {};
    this.stp = { costToRoot:0, rootBridge:this.id, rootPort:null };
  }

  async receive(frame, inPortId) {
    this.macTable[frame.sourceMac] = { portId:inPortId, time:Date.now() };
    if (selectedId === this.id) renderProps();

    const inPort = this.ports.find(p => p.id === inPortId);
    if (!inPort || inPort.stpState === 'blocking' || inPort.adminState === 'down') return;
    await sleep(100);

    const forwardPorts = this.ports.filter(p =>
      p.connectedLink && p.stpState === 'forwarding' && p.adminState !== 'down' && p.id !== inPortId
    );

    if (frame.destMac === 'FF:FF:FF:FF:FF:FF') {
      forwardPorts.forEach(p => transmit(frame, this.id, p.id));
    } else if (this.macTable[frame.destMac]) {
      const destPortId = this.macTable[frame.destMac].portId;
      const destPort   = this.ports.find(p => p.id === destPortId);
      if (destPort && destPort.stpState === 'forwarding' && destPort.adminState !== 'down' && destPortId !== inPortId) {
        transmit(frame, this.id, destPortId);
      } else {
        forwardPorts.forEach(p => transmit(frame, this.id, p.id));
      }
    } else {
      forwardPorts.forEach(p => transmit(frame, this.id, p.id));
    }
  }
}

class Router extends Device {
  constructor(x, y) {
    super('Router', x, y);
    this.interfaces = {
      'Fa0/0':   { id:'Fa0/0',   type:'ethernet', ip:'0.0.0.0', subnet:'0.0.0.0', mac:mac(), connectedLink:null, adminState:'up' },
      'Se0/0/0': { id:'Se0/0/0', type:'serial',   ip:'0.0.0.0', subnet:'0.0.0.0', mac:mac(), connectedLink:null, adminState:'up' },
      'Se0/0/1': { id:'Se0/0/1', type:'serial',   ip:'0.0.0.0', subnet:'0.0.0.0', mac:mac(), connectedLink:null, adminState:'up' },
    };
    this.routingTable    = [];
    this.arpCache        = {};
    this.ripEnabled      = false;
    this.ripBroadcastCount = 0;
  }

  updateConnectedRoutes() {
    this.routingTable = this.routingTable.filter(r => r.type !== 'C');
    for (const iface of Object.values(this.interfaces)) {
      if (iface.ip !== '0.0.0.0' && iface.adminState === 'up' && iface.connectedLink) {
        this.routingTable.push({
          network: network(iface.ip, iface.subnet),
          mask: iface.subnet, nextHop:'0.0.0.0',
          interface: iface.id, metric:0, type:'C'
        });
      }
    }
  }

  async receive(frame, inPortId) {
    const iface = this.interfaces[inPortId];
    if (!iface || iface.adminState === 'down') return;

    const forMe = frame.destMac === iface.mac
      || frame.destMac === 'FF:FF:FF:FF:FF:FF'
      || frame.destMac === '01:00:5E:00:00:09';
    if (!forMe) return;

    const p = frame.payload;

    if (p.type === 'ARP_REQ' && p.targetIp === iface.ip) {
      await sleep(100);
      transmit({ sourceMac:iface.mac, destMac:frame.sourceMac,
        payload:{ type:'ARP_REP', sourceIp:iface.ip, targetIp:p.sourceIp, targetMac:frame.sourceMac }
      }, this.id, inPortId);
      return;
    }
    if (p.type === 'ARP_REP' && p.targetIp === iface.ip) {
      this.arpCache[p.sourceIp] = frame.sourceMac;
      document.dispatchEvent(new CustomEvent(`router_arp_${this.id}`, { detail:{ ip:p.sourceIp, mac:frame.sourceMac } }));
      if (selectedId === this.id) renderProps();
      return;
    }
    if (p.type === 'RIP_UPDATE' && this.ripEnabled) {
      let changed = false;
      for (const route of p.routes) {
        const metric = route.metric + 1;
        if (metric >= 16) continue;
        const existing = this.routingTable.find(r => r.network === route.network && r.mask === route.mask);
        if (!existing) {
          this.routingTable.push({ network:route.network, mask:route.mask, nextHop:p.sourceIp, interface:inPortId, metric, type:'R' });
          changed = true;
        } else if (existing.type === 'R') {
          if (existing.nextHop === p.sourceIp && existing.metric !== metric) { existing.metric = metric; changed = true; }
          else if (metric < existing.metric) { existing.metric = metric; existing.nextHop = p.sourceIp; existing.interface = inPortId; changed = true; }
        }
      }
      if (changed) { this.ripBroadcastCount = 0; if (selectedId === this.id) renderProps(); }
      return;
    }
    if (p.type === 'ICMP_REQ' && Object.values(this.interfaces).some(i => i.ip === p.targetIp)) {
      await sleep(100);
      transmit({ sourceMac:iface.mac, destMac:frame.sourceMac,
        payload:{ type:'ICMP_REP', sourceIp:p.targetIp, targetIp:p.sourceIp }
      }, this.id, inPortId);
      return;
    }
    await this.routePacket(frame);
  }

  async routePacket(frame) {
    const targetIp = frame.payload.targetIp;
    if (!targetIp) return;

    let bestRoute = null, maxPrefix = -1;
    for (const route of this.routingTable) {
      if (sameNet(targetIp, route.network, route.mask)) {
        const p = prefixLen(route.mask);
        if (p > maxPrefix) { maxPrefix = p; bestRoute = route; }
      }
    }
    if (!bestRoute) return;

    const outIface = this.interfaces[bestRoute.interface];
    if (!outIface || outIface.adminState === 'down' || !outIface.connectedLink) return;

    const nextHopIp = bestRoute.type === 'C' ? targetIp : bestRoute.nextHop;
    let nextHopMac  = this.arpCache[nextHopIp];

    if (!nextHopMac) {
      let resolved = false;
      const onArp = e => { if (e.detail.ip === nextHopIp) resolved = true; };
      document.addEventListener(`router_arp_${this.id}`, onArp, { once:true });
      transmit({ sourceMac:outIface.mac, destMac:'FF:FF:FF:FF:FF:FF',
        payload:{ type:'ARP_REQ', sourceIp:outIface.ip, targetIp:nextHopIp }
      }, this.id, outIface.id);
      for (let i=0; i<15; i++) { await sleep(100); if (resolved) break; }
      document.removeEventListener(`router_arp_${this.id}`, onArp);
      nextHopMac = this.arpCache[nextHopIp];
    }
    if (nextHopMac) {
      transmit({ sourceMac:outIface.mac, destMac:nextHopMac, payload:frame.payload, ttl:frame.ttl }, this.id, outIface.id);
    }
  }
}

class AccessPoint extends Device {
  constructor(x, y) {
    super('AP', x, y);
    this.ports    = [{ id:1, connectedLink:null, stpState:'forwarding', adminState:'up' }];
    this.macTable = {};
    this.ssid     = `WiFi_${this.name}`;
    this.band     = '2.4';
    this.security = 'WPA2';
    this.password = '';
  }

  async receive(frame, inPortId) {
    this.macTable[frame.sourceMac] = { portId:inPortId, time:Date.now() };
    if (selectedId === this.id) renderProps();
    await sleep(100);

    // Forward between wired and wireless
    const allPorts = [
      ...this.ports.map(p => ({ id:p.id, link:p.connectedLink, forwarding: p.stpState==='forwarding' && p.adminState!=='down' })),
      ...Object.values(links)
        .filter(l => l.isWireless && (l.source===this.id || l.target===this.id))
        .map(l => ({ id:l.id, link:l.id, forwarding:true, wireless:true }))
    ].filter(p => p.forwarding && p.id !== inPortId && p.link);

    if (frame.destMac === 'FF:FF:FF:FF:FF:FF') {
      allPorts.forEach(p => transmit(frame, this.id, p.id));
    } else if (this.macTable[frame.destMac]) {
      const destId = this.macTable[frame.destMac].portId;
      if (destId !== inPortId) transmit(frame, this.id, destId);
      else allPorts.forEach(p => transmit(frame, this.id, p.id));
    } else {
      allPorts.forEach(p => transmit(frame, this.id, p.id));
    }
  }
}

/* ================================================================
   NETWORK ENGINE
   ================================================================ */
function transmit(frame, fromDevId, fromPortId) {
  const fromDev = devices[fromDevId];
  if (!fromDev) return;

  // Find all links connected to this port
  for (const link of Object.values(links)) {
    let toDevId = null, toPortId = null;

    if (link.isWireless) {
      // Wireless link
      if (link.source === fromDevId && fromPortId === 'wlan0') { toDevId = link.target; toPortId = link.targetPort; }
      else if (link.target === fromDevId) {
        // Find the AP's port (link.id is used as AP port key)
        const ap = devices[link.source];
        if (ap) { toDevId = ap.id; toPortId = link.id; }
      }
    } else {
      // Wired link
      let portMatch = false;
      if (link.source === fromDevId) {
        const sPort = (fromDev.type==='Router') ? fromPortId : fromPortId;
        portMatch = link.sourcePort === sPort;
        if (portMatch) { toDevId = link.target; toPortId = link.targetPort; }
      } else if (link.target === fromDevId) {
        const tPort = (fromDev.type==='Router') ? fromPortId : fromPortId;
        portMatch = link.targetPort === tPort;
        if (portMatch) { toDevId = link.source; toPortId = link.sourcePort; }
      }
    }

    if (!toDevId || !devices[toDevId]) continue;

    const toDev = devices[toDevId];
    if (!frame.silent) {
      animatePacket(fromDevId, toDevId, frame);
    }
    setTimeout(() => toDev.receive(frame, toPortId), 0);
  }
}

function animatePacket(fromId, toId, frame) {
  const fromDev = devices[fromId];
  const toDev   = devices[toId];
  if (!fromDev || !toDev) return;

  const packetEl = document.createElement('div');
  packetEl.style.cssText = `
    position:absolute; pointer-events:none; z-index:25;
    width:10px; height:10px; border-radius:50%;
    background:${frame.payload?.type?.startsWith('ARP') ? 'var(--amber)' : 'var(--cyan)'};
    box-shadow:0 0 8px currentColor;
    left:${fromDev.x}px; top:${fromDev.y}px;
    transition:left 0.3s ease, top 0.3s ease;
    transform:translate(-50%,-50%);
  `;
  NODES.appendChild(packetEl);
  requestAnimationFrame(() => {
    packetEl.style.left = `${toDev.x}px`;
    packetEl.style.top  = `${toDev.y}px`;
  });
  setTimeout(() => packetEl.remove(), 400);
}

function flushMacTables() {
  let flushed = false;
  for (const d of Object.values(devices)) {
    if ((d.type==='Switch' || d.type==='AP') && Object.keys(d.macTable).length > 0) {
      d.macTable = {}; flushed = true;
    }
  }
  if (flushed) log('Topology change: MAC tables flushed.', 'info');
}

function evaluateWifi() {
  let changed = false;
  for (const laptop of Object.values(devices).filter(d => d.type==='Laptop')) {
    if (!laptop.ssid) {
      if (laptop.connectedAp) { deleteLink(laptop.port, true); laptop.connectedAp = null; changed = true; }
      continue;
    }
    const aps = Object.values(devices).filter(d =>
      d.type==='AP' && d.ssid===laptop.ssid && d.password===laptop.password
    );
    let bestAp=null, bestDist=Infinity;
    for (const ap of aps) {
      const maxDist = ap.band==='2.4' ? 350 : 200;
      const dist    = Math.hypot(ap.x - laptop.x, ap.y - laptop.y);
      if (dist <= maxDist && dist < bestDist) { bestDist = dist; bestAp = ap; }
    }
    if (bestAp) {
      if (laptop.connectedAp !== bestAp.id) {
        if (laptop.port) deleteLink(laptop.port, true);
        const lid = uid();
        links[lid] = { id:lid, source:laptop.id, target:bestAp.id, sourcePort:'wlan0', targetPort:lid, isWireless:true };
        laptop.port = lid; laptop.connectedAp = bestAp.id;
        log(`[${laptop.name}] Associated with '${bestAp.ssid}' (${bestDist.toFixed(0)}px).`);
        changed = true;
        triggerHaptic(0.4, 50);
      }
    } else {
      if (laptop.connectedAp) {
        deleteLink(laptop.port, true); laptop.connectedAp = null;
        log(`[${laptop.name}] Lost Wi-Fi.`, 'warn');
        changed = true;
      }
    }
  }
  if (changed) { flushMacTables(); if (stpEnabled) calcSTP(); else renderLinks(); renderProps(); renderNodes(); }
}

/* ================================================================
   STP
   ================================================================ */
function calcSTP() {
  const switches = Object.values(devices).filter(d => d.type==='Switch');
  if (!switches.length) { renderLinks(); return; }

  // Reset all switch ports to forwarding
  for (const sw of switches) {
    sw.stp = { costToRoot:Infinity, rootBridge:sw.id, rootPort:null };
    for (const p of sw.ports) {
      if (p.connectedLink && p.adminState !== 'down') p.stpState = 'forwarding';
    }
  }
  // Elect root bridge (lowest MAC)
  const root = switches.reduce((a,b) => a.mac < b.mac ? a : b);
  root.stp = { costToRoot:0, rootBridge:root.id, rootPort:null };

  // BFS cost propagation
  const visited = new Set([root.id]);
  const queue = [root];
  while (queue.length) {
    const sw = queue.shift();
    for (const port of sw.ports) {
      if (!port.connectedLink || port.adminState==='down') continue;
      const link = links[port.connectedLink];
      if (!link) continue;
      const peerId = link.source===sw.id ? link.target : link.source;
      const peer   = devices[peerId];
      if (!peer || peer.type!=='Switch' || visited.has(peerId)) continue;
      visited.add(peerId);
      peer.stp = { costToRoot: sw.stp.costToRoot + 1, rootBridge:root.id, rootPort:null };
      queue.push(peer);
    }
  }

  // Block redundant ports
  for (const link of Object.values(links)) {
    const devA = devices[link.source];
    const devB = devices[link.target];
    if (!devA || !devB) continue;
    if (devA.type!=='Switch' || devB.type!=='Switch') continue;

    const portA = devA.ports.find(p => p.id===link.sourcePort);
    const portB = devB.ports.find(p => p.id===link.targetPort);
    if (!portA || !portB) continue;
    if (portA.adminState==='down' || portB.adminState==='down') continue;

    // Block the port on the switch with higher cost to root
    if (devA.stp.costToRoot > devB.stp.costToRoot) {
      portA.stpState = 'blocking';
    } else if (devB.stp.costToRoot > devA.stp.costToRoot) {
      portB.stpState = 'blocking';
    } else if (devA.mac > devB.mac) {
      portA.stpState = 'blocking';
    }
  }

  flushMacTables();
  renderLinks();
  if (selectedId) renderProps();
}

/* ================================================================
   LINK MANAGEMENT
   ================================================================ */
function createLink(srcId, srcPort, dstId, dstPort) {
  const devA = devices[srcId];
  const devB = devices[dstId];
  const lid  = uid();
  links[lid] = { id:lid, source:srcId, target:dstId, sourcePort:srcPort, targetPort:dstPort };

  if (devA.type==='PC' || devA.type==='Laptop') devA.port = lid;
  else if (devA.type==='Router')                devA.interfaces[srcPort].connectedLink = lid;
  else                                          devA.ports.find(p=>p.id===srcPort).connectedLink = lid;

  if (devB.type==='PC' || devB.type==='Laptop') devB.port = lid;
  else if (devB.type==='Router')                devB.interfaces[dstPort].connectedLink = lid;
  else                                          devB.ports.find(p=>p.id===dstPort).connectedLink = lid;

  if (devA.type==='Router') { devA.updateConnectedRoutes(); devA.ripBroadcastCount=0; }
  if (devB.type==='Router') { devB.updateConnectedRoutes(); devB.ripBroadcastCount=0; }
  flushMacTables();
  triggerHaptic(0.6, 60);
  if (stpEnabled) calcSTP(); else { renderLinks(); if (selectedId) renderProps(); }
}

function deleteLink(lid, skipUpdate=false) {
  const l = links[lid];
  if (!l) return;
  const devA = devices[l.source];
  const devB = devices[l.target];

  if (devA) {
    if (devA.type==='PC'||devA.type==='Laptop') { devA.port=null; if(devA.type==='Laptop') devA.connectedAp=null; }
    else if (devA.type==='Router')              { devA.interfaces[l.sourcePort].connectedLink=null; devA.updateConnectedRoutes(); devA.ripBroadcastCount=0; }
    else if (devA.type==='AP' && l.isWireless)  {}
    else { const p=devA.ports.find(p=>p.id===l.sourcePort); if(p){p.connectedLink=null; p.stpState='forwarding';} }
  }
  if (devB) {
    if (devB.type==='PC'||devB.type==='Laptop') { devB.port=null; if(devB.type==='Laptop') devB.connectedAp=null; }
    else if (devB.type==='Router')              { devB.interfaces[l.targetPort].connectedLink=null; devB.updateConnectedRoutes(); devB.ripBroadcastCount=0; }
    else if (devB.type==='AP' && l.isWireless)  {}
    else { const p=devB.ports.find(p=>p.id===l.targetPort); if(p){p.connectedLink=null; p.stpState='forwarding';} }
  }
  delete links[lid];
  triggerHaptic(0.4, 30);
  if (!skipUpdate) { flushMacTables(); if (stpEnabled) calcSTP(); else { renderLinks(); if(selectedId) renderProps(); } }
}

function deleteSelected() {
  if (selectedId) {
    const dev = devices[selectedId];
    const toRemove = Object.keys(links).filter(lid => links[lid].source===dev.id || links[lid].target===dev.id);
    toRemove.forEach(lid => deleteLink(lid, true));
    delete devices[selectedId];
    selectedId = null;
    flushMacTables(); evaluateWifi(); renderNodes(); if(stpEnabled) calcSTP(); else renderLinks(); renderProps();
    triggerHaptic(0.5, 50);
  } else if (selectedLabelId) {
    delete labels[selectedLabelId]; selectedLabelId=null; renderNodes(); renderProps();
  }
}

/* ================================================================
   RENDERING
   ================================================================ */
function renderNodes() {
  NODES.innerHTML = '';
  for (const id in labels) {
    const lbl = labels[id];
    const el  = document.createElement('div');
    el.className = `text-label-node${id===selectedLabelId?' selected':''}`;
    el.style.left = `${lbl.x}px`; el.style.top = `${lbl.y}px`;
    el.setAttribute('data-id', id); el.setAttribute('data-type','label');
    el.style.fontSize = `${lbl.size||14}px`;
    el.style.color    = lbl.color || 'var(--text)';
    el.textContent    = lbl.text;
    el.onpointerdown  = e => { e.stopPropagation(); startNodeDrag(e, id, 'Label'); };
    el.onclick        = e => { e.stopPropagation(); selectLabel(id); };
    NODES.appendChild(el);
  }

  for (const id in devices) {
    const dev = devices[id];
    const el  = document.createElement('div');
    el.className = `device-node${id===selectedId?' selected':''}${id===pendingSrc?' pending':''}`;
    el.style.left = `${dev.x}px`; el.style.top = `${dev.y}px`;
    el.setAttribute('data-id', id);

    // AP range circle
    if (dev.type === 'AP') {
      const sz = dev.band==='2.4' ? 700 : 400;
      const ring = document.createElement('div');
      ring.className = 'ap-radius';
      ring.style.width  = `${sz}px`; ring.style.height = `${sz}px`;
      el.appendChild(ring);
    }

    // Signal badge for Laptops
    if (dev.type === 'Laptop' && dev.connectedAp) {
      const ap   = devices[dev.connectedAp];
      if (ap) {
        const maxD  = ap.band==='2.4' ? 350 : 200;
        const dist  = Math.hypot(ap.x-dev.x, ap.y-dev.y);
        const sig   = Math.max(0, Math.min(100, Math.round((1-(dist/maxD))*100)));
        const badge = document.createElement('div');
        badge.id    = `signal-${id}`;
        badge.className = 'node-badge';
        badge.style.background = sig<30?'var(--red)':sig<60?'var(--amber)':'var(--green)';
        badge.style.color      = '#000';
        badge.textContent      = `${sig}%`;
        el.appendChild(badge);
      }
    }

    const icon = document.createElement('div');
    icon.className = 'node-icon';
    icon.innerHTML = getDeviceIcon(dev.type);

    const nameEl = document.createElement('div');
    nameEl.className = 'node-label';
    nameEl.textContent = dev.name;

    el.appendChild(icon); el.appendChild(nameEl);

    el.onpointerdown = e => { e.stopPropagation(); handleNodePointerDown(e, id); };
    el.onclick       = e => { e.stopPropagation(); handleNodeClick(id); };
    NODES.appendChild(el);
  }

  updatePingDropdown();
}

function getDeviceIcon(type) {
  const color = 'var(--cyan)';
  const icons = {
    PC:     `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="8" x="5" y="2" rx="2"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h2"/><path d="M12 18h6"/></svg>`,
    Switch: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h.01M10 12h.01M14 12h.01M18 12h.01"/></svg>`,
    Router: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m12 8-4 4h8l-4-4Z"/><path d="m12 16 4-4H8l4 4Z"/></svg>`,
    AP:     `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h.01"/><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/></svg>`,
    Laptop: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/></svg>`,
  };
  return icons[type] || '';
}

function renderLinks() {
  CABLES.innerHTML = '';
  for (const link of Object.values(links)) {
    const devA = devices[link.source];
    const devB = devices[link.target];
    if (!devA || !devB) continue;

    const isWireless = !!link.isWireless;

    // Get port state
    let portADown=false, portBDown=false, portABlocking=false, portBBlocking=false;

    if (devA.type==='Switch'||devA.type==='AP') {
      const p = devA.ports.find(p=>p.id===link.sourcePort);
      if (p) { portADown=p.adminState==='down'; portABlocking=p.stpState==='blocking'; }
    } else if (devA.type==='Router') {
      const i = devA.interfaces[link.sourcePort];
      if (i) portADown = i.adminState==='down';
    }
    if (devB.type==='Switch'||devB.type==='AP') {
      const p = devB.ports.find(p=>p.id===link.targetPort);
      if (p) { portBDown=p.adminState==='down'; portBBlocking=p.stpState==='blocking'; }
    } else if (devB.type==='Router') {
      const i = devB.interfaces[link.targetPort];
      if (i) portBDown = i.adminState==='down';
    }

    const isDown    = portADown || portBDown;
    const isBlocked = !isDown && (portABlocking || portBBlocking);
    const color     = isDown ? 'rgba(100,120,140,0.3)' : isBlocked ? 'rgba(255,68,85,0.6)' : isWireless ? 'rgba(0,255,136,0.4)' : 'rgba(0,210,255,0.5)';
    const dash      = isWireless ? '6,6' : isBlocked ? '8,4' : 'none';

    // Draw bezier cable
    const cx = (devA.x + devB.x) / 2;
    const cy = (devA.y + devB.y) / 2 - Math.min(60, Math.hypot(devB.x-devA.x, devB.y-devA.y) * 0.2);
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', `M${devA.x},${devA.y} Q${cx},${cy} ${devB.x},${devB.y}`);
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '2');
    path.setAttribute('fill', 'none');
    if (dash !== 'none') path.setAttribute('stroke-dasharray', dash);
    CABLES.appendChild(path);

    // Port lights
    const len = Math.hypot(devB.x-devA.x, devB.y-devA.y);
    if (len > 80) {
      const tA  = 30/len; const tB = 1 - 30/len;
      const ptA = bezierPoint(devA.x, devA.y, cx, cy, devB.x, devB.y, tA);
      const ptB = bezierPoint(devA.x, devA.y, cx, cy, devB.x, devB.y, tB);
      const colA = portADown ? 'rgba(100,120,140,0.5)' : portABlocking ? 'var(--red)' : 'var(--green)';
      const colB = portBDown ? 'rgba(100,120,140,0.5)' : portBBlocking ? 'var(--red)' : 'var(--green)';
      drawLight(ptA.x, ptA.y, colA);
      drawLight(ptB.x, ptB.y, colB);

      // Port labels for switches/routers
      if (len > 120) {
        const tLA = Math.min(0.4, 60/len); const tLB = 1 - tLA;
        if (devA.type==='Switch'||devA.type==='AP') {
          const pt = bezierPoint(devA.x,devA.y,cx,cy,devB.x,devB.y,tLA);
          drawPortLabel(pt.x, pt.y, `Fa0/${link.sourcePort}`);
        } else if (devA.type==='Router') {
          const pt = bezierPoint(devA.x,devA.y,cx,cy,devB.x,devB.y,tLA);
          drawPortLabel(pt.x, pt.y, link.sourcePort);
        }
        if (devB.type==='Switch'||devB.type==='AP') {
          const pt = bezierPoint(devA.x,devA.y,cx,cy,devB.x,devB.y,tLB);
          drawPortLabel(pt.x, pt.y, `Fa0/${link.targetPort}`);
        } else if (devB.type==='Router') {
          const pt = bezierPoint(devA.x,devA.y,cx,cy,devB.x,devB.y,tLB);
          drawPortLabel(pt.x, pt.y, link.targetPort);
        }
      }
    }
  }

  // Pending cable line
  if (pendingSrc && mode==='addCable') {
    const devA = devices[pendingSrc];
    const line = document.createElementNS(SVG_NS, 'line');
    line.setAttribute('x1', devA.x); line.setAttribute('y1', devA.y);
    line.setAttribute('x2', cableMouseX); line.setAttribute('y2', cableMouseY);
    line.setAttribute('stroke', 'var(--amber)');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-dasharray', '6,6');
    CABLES.appendChild(line);
  }
}

function bezierPoint(x0,y0,cx,cy,x1,y1,t) {
  const mt = 1-t;
  return { x: mt*mt*x0 + 2*mt*t*cx + t*t*x1, y: mt*mt*y0 + 2*mt*t*cy + t*t*y1 };
}

function drawLight(x, y, color) {
  const c = document.createElementNS(SVG_NS, 'circle');
  c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', '5');
  c.setAttribute('fill', color);
  CABLES.appendChild(c);
}

function drawPortLabel(x, y, text) {
  const t = document.createElementNS(SVG_NS, 'text');
  t.setAttribute('x', x); t.setAttribute('y', y - 8);
  t.setAttribute('text-anchor', 'middle');
  t.setAttribute('fill', 'var(--text-dim)');
  t.setAttribute('font-family', 'Share Tech Mono, monospace');
  t.setAttribute('font-size', '9');
  t.textContent = text;
  CABLES.appendChild(t);
}

function showSuccessTick(devId) {
  const dev = devices[devId];
  if (!dev) return;
  const tick = document.createElement('div');
  tick.className = 'success-tick';
  tick.textContent = '✓ OK';
  tick.style.left = `${dev.x + panX}px`;
  tick.style.top  = `${dev.y + panY - 30}px`;
  NODES.parentElement.appendChild(tick);
  setTimeout(() => tick.remove(), 1200);
}

function renderProps() {
  const panel    = document.getElementById('panel-props');
  const scroll   = document.getElementById('props-scroll');
  const titleEl  = document.getElementById('props-title');

  if (!selectedId && !selectedLabelId) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = '';

  if (selectedLabelId) {
    const lbl = labels[selectedLabelId];
    titleEl.textContent = 'TEXT LABEL';
    scroll.innerHTML = `
      <div class="props-section">
        <div class="props-row"><div class="field-label">Text</div>
          <input class="field-input" value="${lbl.text}" oninput="labels['${selectedLabelId}'].text=this.value;renderNodes()">
        </div>
        <div class="props-row"><div class="field-label">Size</div>
          <input class="field-input" type="number" value="${lbl.size||14}" min="8" max="48"
            oninput="labels['${selectedLabelId}'].size=parseInt(this.value)||14;renderNodes()">
        </div>
      </div>
      <button class="btn-danger" onclick="deleteSelected()">DELETE LABEL</button>
    `;
    return;
  }

  const dev = devices[selectedId];
  if (!dev) { panel.style.display='none'; return; }
  titleEl.textContent = dev.name;

  let html = `<div class="props-section"><div class="props-section-title">DEVICE INFO</div>
    <div class="props-kv"><span class="k">TYPE</span><span class="v">${dev.type}</span></div>
    <div class="props-kv"><span class="k">MAC</span><span class="v">${dev.mac}</span></div>
  </div>`;

  if (dev.type === 'PC' || dev.type === 'Laptop') {
    html += `
      <div class="props-section"><div class="props-section-title">IP CONFIG</div>
        <div class="props-row"><div class="field-label">IP Address</div><input class="field-input" id="prop-ip" value="${dev.ip}"></div>

        ${dev.type==='Laptop' ? `
        <div class="props-row"><div class="field-label">SSID</div><input class="field-input" id="prop-ssid" value="${dev.ssid}"></div>
        <div class="props-row"><div class="field-label">Password</div><input class="field-input" id="prop-pass" value="${dev.password}"></div>
        ` : ''}
      </div>
      <button class="btn-primary" id="btn-save-dev" onclick="saveEndpoint('${dev.id}')">SAVE SETTINGS</button>
    `;
    if (Object.keys(dev.arpCache).length) {
      html += `<div class="props-section" style="margin-top:12px"><div class="props-section-title">ARP CACHE</div>`;
      for (const [ip,m] of Object.entries(dev.arpCache)) {
        html += `<div class="props-kv"><span class="k">${ip}</span><span class="v">${m}</span></div>`;
      }
      html += `</div><button class="btn-danger" onclick="devices['${dev.id}'].arpCache={};renderProps();triggerHaptic()">CLEAR ARP</button>`;
    }
  }

  if (dev.type === 'Switch') {
    html += `<div class="props-section"><div class="props-section-title">PORTS</div>`;
    for (const p of dev.ports) {
      const stateColor = p.adminState==='down'?'var(--text-dim)':p.stpState==='blocking'?'var(--red)':'var(--green)';
      html += `<div class="props-kv">
        <span class="k">Fa0/${p.id}</span>
        <span class="v" style="color:${stateColor}">${p.adminState==='down'?'DOWN':p.stpState.toUpperCase()}</span>
        <button style="margin-left:8px;font-family:var(--mono);font-size:9px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text-dim);cursor:pointer"
          onclick="togglePortAdmin('${dev.id}',${p.id})">${p.adminState==='down'?'UP':'DOWN'}</button>
      </div>`;
    }
    html += `</div>`;
    if (Object.keys(dev.macTable).length) {
      html += `<div class="props-section"><div class="props-section-title">MAC TABLE</div>`;
      for (const [m,e] of Object.entries(dev.macTable)) {
        html += `<div class="props-kv"><span class="k">${m}</span><span class="v">Fa0/${e.portId}</span></div>`;
      }
      html += `</div><button class="btn-danger" onclick="devices['${dev.id}'].macTable={};renderProps();triggerHaptic()">CLEAR TABLE</button>`;
    }
  }

  if (dev.type === 'Router') {
    html += `<div class="props-section"><div class="props-section-title">INTERFACES</div>`;
    for (const iface of Object.values(dev.interfaces)) {
      const rid = iface.id.replace(/\//g,'-');
      html += `
        <div style="border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px">
          <div style="font-family:var(--mono);font-size:10px;color:var(--cyan);margin-bottom:8px">${iface.id}</div>
          <div class="props-row"><div class="field-label">IP</div><input class="field-input" id="prop-ip-${rid}" value="${iface.ip}"></div>
          <div class="props-row"><div class="field-label">Subnet</div><input class="field-input" id="prop-sub-${rid}" value="${iface.subnet}"></div>
        </div>`;

    html += `</div>

      </div>

    if (dev.routingTable.length) {
      html += `<div class="props-section" style="margin-top:12px"><div class="props-section-title">ROUTING TABLE</div>`;
      for (const r of dev.routingTable) {
        html += `<div class="props-kv"><span class="k">${r.network}/${prefixLen(r.mask)}</span><span class="v" style="color:${r.type==='C'?'var(--green)':'var(--cyan)'}">[${r.type}] ${r.nextHop==='0.0.0.0'?'direct':r.nextHop}</span></div>`;
      }
      html += `</div>`;
    }
  }

  if (dev.type === 'AP') {
    html += `
      <div class="props-section"><div class="props-section-title">AP CONFIG</div>
        <div class="props-row"><div class="field-label">SSID</div><input class="field-input" id="prop-ap-ssid" value="${dev.ssid}"></div>
        <div class="props-row"><div class="field-label">Band</div>
          <select class="field-select" id="prop-ap-band">
            <option value="2.4" ${dev.band==='2.4'?'selected':''}>2.4 GHz</option>
            <option value="5"   ${dev.band==='5'?'selected':''}>5 GHz</option>
          </select>
        </div>
        <div class="props-row"><div class="field-label">Security</div>
          <select class="field-select" id="prop-ap-sec">
            <option ${dev.security==='None'?'selected':''}>None</option>
            <option ${dev.security==='WPA2'?'selected':''}>WPA2</option>
            <option ${dev.security==='WPA3'?'selected':''}>WPA3</option>
          </select>
        </div>
        <div class="props-row"><div class="field-label">Password</div><input class="field-input" id="prop-ap-pass" value="${dev.password}"></div>
      </div>
      <button class="btn-primary" id="btn-save-ap" onclick="saveAP('${dev.id}')">SAVE AP CONFIG</button>`;
  }

  html += `<div style="margin-top:14px"><button class="btn-danger" onclick="deleteSelected()">DELETE DEVICE</button></div>`;
  scroll.innerHTML = html;
}

/* ================================================================
   PROP SAVE FUNCTIONS
   ================================================================ */
window.saveEndpoint = id => {
  const dev = devices[id];
  dev.ip      = document.getElementById('prop-ip').value;
  dev.subnet  = document.getElementById('prop-sub').value;

/* ================================================================
   PING
   ================================================================ */
window.executePing = async () => {
  const srcId    = document.getElementById('ping-source').value;
  const targetIp = document.getElementById('ping-target').value;
  triggerHaptic(0.2,20);
  if (!srcId)    { log('Ping: select source.', 'error'); return; }
  if (!targetIp) { log('Ping: select destination.', 'error'); return; }
  if (targetIp==='0.0.0.0') { log('Ping: destination has no IP.', 'error'); return; }

  const pc = devices[srcId];
  if (!pc.port) { log(`[${pc.name}] Cable unplugged.`, 'error'); return; }
  log(`[${pc.name}] Pinging ${targetIp}...`, 'info');

  let destIp = sameNet(pc.ip, targetIp, pc.subnet) ? targetIp : pc.gateway;
  if (!destIp || destIp==='0.0.0.0') { log(`[${pc.name}] Host unreachable.`, 'error'); return; }

  let targetMac = pc.arpCache[destIp];
  if (!targetMac) {
    log(`[${pc.name}] ARP for ${destIp}...`, 'info');
    let resolved = false;
    const onArp = e => { if (e.detail.ip===destIp) resolved=true; };
    document.addEventListener('arp_resolved', onArp, { once:true });
    transmit({ sourceMac:pc.mac, destMac:'FF:FF:FF:FF:FF:FF',
      payload:{ type:'ARP_REQ', sourceIp:pc.ip, targetIp:destIp }
    }, pc.id, 1);
    for (let i=0; i<100; i++) { await sleep(100); if (resolved) break; }
    document.removeEventListener('arp_resolved', onArp);
    targetMac = pc.arpCache[destIp];
    if (!targetMac) { log(`[${pc.name}] ARP timed out.`, 'error'); triggerHaptic(0.5,100); return; }
  }

  let replied = false;
  const onIcmp = () => replied=true;
  document.addEventListener('icmp_replied', onIcmp, { once:true });
  transmit({ sourceMac:pc.mac, destMac:targetMac,
    payload:{ type:'ICMP_REQ', sourceIp:pc.ip, targetIp }
  }, pc.id, 1);
  for (let i=0; i<100; i++) { await sleep(100); if (replied) break; }
  document.removeEventListener('icmp_replied', onIcmp);

  if (!replied) { log(`[${pc.name}] Request timed out.`, 'error'); triggerHaptic(0.5,100); }
  else showSuccessTick(pc.id);
};

function updatePingDropdown() {
  const src = document.getElementById('ping-source');
  const dst = document.getElementById('ping-target');
  if (!src || !dst) return;
  const sv = src.value, dv = dst.value;
  src.innerHTML = '<option value="">Select source...</option>';
  dst.innerHTML = '<option value="">Select destination...</option>';
  for (const dev of Object.values(devices)) {
    if (dev.type==='PC'||dev.type==='Laptop') {
      src.innerHTML += `<option value="${dev.id}">${dev.name}</option>`;
      dst.innerHTML += `<option value="${dev.ip}">${dev.name} (${dev.ip})</option>`;
    } else if (dev.type==='Router') {
      for (const iface of Object.values(dev.interfaces)) {
        if (iface.ip!=='0.0.0.0')
          dst.innerHTML += `<option value="${iface.ip}">${dev.name} ${iface.id} (${iface.ip})</option>`;
      }
    }
  }
  src.value = sv; dst.value = dv;
}

   ================================================================ */
function showPortSelector(devId, x, y, callback) {
  hidePortSelector();
  const dev   = devices[devId];
  let ports   = [];

  if (dev.type==='Switch'||dev.type==='AP') {
    ports = dev.ports.filter(p=>!p.connectedLink).map(p=>({ id:p.id, label:`Fa0/${p.id}` }));
  } else if (dev.type==='Router') {
    ports = Object.values(dev.interfaces).filter(i=>!i.connectedLink).map(i=>({ id:i.id, label:i.id }));
  }
  if (!ports.length) return;

  const sel = document.getElementById('port-selector');
  sel.innerHTML = '<div class="port-selector-title">SELECT PORT</div>';
  for (const p of ports) {
    const opt = document.createElement('div');
    opt.className = 'port-option';
    opt.textContent = p.label;
    opt.onclick = e => { e.stopPropagation(); sel.style.display='none'; callback(p.id); triggerHaptic(0.2,20); };
    sel.appendChild(opt);
  }
  // Position relative to workspace
  const rect = WS.getBoundingClientRect();
  sel.style.left = `${x + panX + 68}px`;
  sel.style.top  = `${y + panY}px`;
  sel.style.display = '';
}

function hidePortSelector() {
  const sel = document.getElementById('port-selector');
  if (sel) sel.style.display = 'none';
}

function startDrag(e, type, el) {
  e.preventDefault();
  dragType  = type;
  dragGhost = document.getElementById('drag-ghost');
  dragGhost.textContent = type;
  dragGhost.style.display = '';
  moveDragGhost(e.clientX, e.clientY);
  triggerHaptic(0.2,30);
  document.body.setPointerCapture(e.pointerId);
}

function moveDragGhost(x,y) {
  if (!dragGhost || dragGhost.style.display==='none') return;
  dragGhost.style.left = `${x}px`;
  dragGhost.style.top  = `${y}px`;
}

function spawnDevice(type, x, y) {
  let dev;
  if      (type==='PC')     dev = new PC(x,y);
  else if (type==='Laptop') dev = new Laptop(x,y);
  else if (type==='Switch') dev = new Switch(x,y);
  else if (type==='Router') dev = new Router(x,y);
  else if (type==='AP')     dev = new AccessPoint(x,y);
  if (dev) { devices[dev.id]=dev; triggerHaptic(0.5,40); renderNodes(); }
}

function handleNodePointerDown(e, id) {
  e.preventDefault();
  if (mode === 'select') {
    dragInfo = { id, startX: e.clientX, startY: e.clientY, moved: false };
    e.currentTarget.setPointerCapture(e.pointerId);
  }
}

function handleNodeClick(id) {
  if (dragInfo?.moved) return;
  if (mode === 'addCable') {
    if (!pendingSrc) {
      const dev = devices[id];
      // PCs/Laptops don't need port selection
      if (dev.type==='PC'||dev.type==='Laptop') {
        if (dev.port) { log(`[${dev.name}] Only one cable allowed.`, 'warn'); return; }
        pendingSrc = id; pendingSrcPort = 1;
        renderNodes();
      } else {
        pendingSrc = id;
        const rect = WS.getBoundingClientRect();
        showPortSelector(id, dev.x, dev.y, portId => {
          pendingSrcPort = portId;
          renderNodes();
        });
      }
    } else {
      if (id === pendingSrc) { pendingSrc=null; pendingSrcPort=null; renderNodes(); return; }
      const dev = devices[id];
      const connectWith = (dstPort) => {
        createLink(pendingSrc, pendingSrcPort, id, dstPort);
        pendingSrc=null; pendingSrcPort=null;
        renderNodes();
      };
      if (dev.type==='PC'||dev.type==='Laptop') {
        if (dev.port) { log(`[${dev.name}] Only one cable allowed.`, 'warn'); pendingSrc=null; pendingSrcPort=null; renderNodes(); return; }
        connectWith(1);
      } else {
        showPortSelector(id, dev.x, dev.y, connectWith);
      }
    }
  } else if (mode === 'select') {
    selectedId = id; selectedLabelId = null;
    renderNodes(); renderProps();
  }
}

/* ================================================================
   GLOBAL POINTER EVENTS
   ================================================================ */
WS.addEventListener('pointerdown', e => {
  if (e.target === WS || e.target === LAYER || e.target === CABLES) {
    isPanning = true;
    panLastX  = e.clientX;
    panLastY  = e.clientY;
    panTotal  = 0;
    WS.setPointerCapture(e.pointerId);
  }
});

window.addEventListener('pointermove', e => {
  if (isPanning) {
    const dx = e.clientX - panLastX;
    const dy = e.clientY - panLastY;
    panX += dx; panY += dy; panTotal += Math.abs(dx)+Math.abs(dy);
    panLastX = e.clientX; panLastY = e.clientY;
    LAYER.style.transform = `translate(${panX}px,${panY}px)`;
    WS.style.backgroundPosition = `left 68px top 0px, ${panX}px ${panY}px`;
    return;
  }
  if (activePanel) {
    activePanel.style.left = `${e.clientX - panelOffset.x}px`;
    activePanel.style.top  = `${e.clientY - panelOffset.y}px`;
    return;
  }
  if (dragGhost && dragGhost.style.display !== 'none') {
    moveDragGhost(e.clientX, e.clientY);
    return;
  }
  if (dragInfo) {
    dragInfo.moved = true;
    const rect = WS.getBoundingClientRect();
    const x = e.clientX - rect.left - panX;
    const y = e.clientY - rect.top  - panY;
    const dev = devices[dragInfo.id];
    dev.x = x; dev.y = y;
    const nodeEl = document.querySelector(`.device-node[data-id="${dragInfo.id}"]`);
    if (nodeEl) { nodeEl.style.left=`${x}px`; nodeEl.style.top=`${y}px`; }
    if (dev.type==='Laptop'||dev.type==='AP') evaluateWifi();
    renderLinks();
    return;
  }
  if (mode==='addCable' && pendingSrc) {
    const rect = WS.getBoundingClientRect();
    cableMouseX = e.clientX - rect.left - panX;
    cableMouseY = e.clientY - rect.top  - panY;
    renderLinks();
  }
});

window.addEventListener('pointerup', e => {
  if (isPanning) {
    isPanning = false;
    WS.releasePointerCapture(e.pointerId);
    return;
  }
  if (activePanel) { activePanel = null; return; }
  if (dragGhost && dragGhost.style.display !== 'none') {
    const rect = WS.getBoundingClientRect();
    if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
      const x = e.clientX - rect.left - panX;
      const y = e.clientY - rect.top  - panY;
      spawnDevice(dragType, x, y);
    }
    dragGhost.style.display='none'; dragType=null;
    document.body.releasePointerCapture(e.pointerId);
  }
  if (dragInfo) { dragInfo=null; }
});

WS.addEventListener('pointerup', e => {
  if (dragGhost?.style.display!=='none' || dragInfo || activePanel) return;
  if (panTotal > 15) { panTotal=0; return; }
  const inPanel = e.target.closest('.panel,#port-selector,#bottom-bar,#btn-stp,#sidebar');
  if (inPanel) return;
  if (mode==='addText') {
    const rect = WS.getBoundingClientRect();
    const lid  = uid();
    labels[lid] = { id:lid, text:'New Text', x:e.clientX-rect.left-panX, y:e.clientY-rect.top-panY };
    setMode('select'); selectedId=null; selectedLabelId=lid; renderProps(); renderNodes();
    return;
  }
  if (e.target === WS || e.target === LAYER || e.target.closest('#cables')) {
    hidePortSelector(); selectedId=null; selectedLabelId=null;
    renderNodes(); renderProps();
  }
});

function startPanelDrag(e, id) {
  if (e.target.closest('button,input,select')) return;
  e.preventDefault();
  activePanel = document.getElementById(id);
  const rect  = activePanel.getBoundingClientRect();

      const d = JSON.parse(ev.target.result);

        const dev = d.devices[id];
        let inst;
        if      (dev.type==='PC')     inst = new PC(dev.x,dev.y);

        else if (dev.type==='Switch') inst = new Switch(dev.x,dev.y);
        else if (dev.type==='Router') inst = new Router(dev.x,dev.y);
        else if (dev.type==='AP')     inst = new AccessPoint(dev.x,dev.y);

      }
      links = d.links||{}; labels = d.labels||{};
      counter = { PC:1,Switch:1,Router:1,AP:1,Laptop:1, ...(d.counter||{}) };
