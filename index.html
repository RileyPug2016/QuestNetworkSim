<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network Simulator - Spatial Diorama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .touch-none { touch-action: none; }
        
        body { margin: 0; overflow: hidden; background-color: #f8fafc; }
        
        #app-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Let clicks pass through to Three.js canvas by default */
            z-index: 10;
        }
        
        /* Re-enable pointer events for UI elements */
        #sidebar, #floating-console, #floating-ping, #floating-properties, #bottom-toolbar, #port-selector, .text-label-node {
            pointer-events: auto;
        }

        /* True WebXR Active Mode Styling */
        html.xr-active, body.xr-active { background: transparent !important; }
        #sidebar.xr-active { background-color: rgba(15, 23, 42, 0.95) !important; width: 110px; }
        
        /* Strip complex filters to prevent compositor culling in VR */
        body.xr-active * { box-shadow: none !important; filter: none !important; backdrop-filter: none !important; }

        /* Scale up UI in XR mode for easier pointing at arm's length */
        body.xr-active #sidebar > button, body.xr-active #sidebar > div[onpointerdown] { transform: scale(1.2); margin-bottom: 12px; }
        body.xr-active #bottom-toolbar { transform: scale(1.25); transform-origin: bottom left; }
        body.xr-active #floating-console, body.xr-active #floating-ping, body.xr-active #floating-properties { transform: scale(1.15); transform-origin: top right; }

        .panel-header { cursor: grab; }
        .panel-header:active { cursor: grabbing; }
        
        #three-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
    </style>
</head>
<body class="text-slate-800 font-sans select-none touch-none transition-colors duration-300">

    <!-- Three.js 3D Engine Canvas -->
    <canvas id="three-canvas"></canvas>

    <!-- UI Overlay (HTML DOM) -->
    <div id="app-container" class="flex transition-colors duration-300">
        
        <!-- Sidebar Tools -->
        <div id="sidebar" class="w-24 bg-slate-900 border-r border-slate-700 flex flex-col items-center py-4 space-y-4 shadow-lg shrink-0 transition-all duration-300">
            <button onclick="setMode('select')" id="btn-select" class="p-3 w-20 flex flex-col items-center rounded-xl bg-blue-600 text-white hover:bg-blue-500 transition-all" title="Select / Pan">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="m13 13 6 6"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Select</span>
            </button>
            <button onclick="setMode('addCable')" id="btn-addCable" class="p-3 w-20 flex flex-col items-center rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all" title="Connect Devices">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Connect</span>
            </button>

            <div class="w-12 border-b border-slate-700 my-2"></div>

            <div onpointerdown="startSidebarDrag(event, 'PC', this)" class="p-3 w-20 flex flex-col items-center rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all cursor-grab" title="Drag to add PC">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><rect width="14" height="8" x="5" y="2" rx="2"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h2"/><path d="M12 18h6"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">PC</span>
            </div>
            <div onpointerdown="startSidebarDrag(event, 'Switch', this)" class="p-3 w-20 flex flex-col items-center rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all cursor-grab" title="Drag to add Switch">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h.01M10 12h.01M14 12h.01M18 12h.01"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Switch</span>
            </div>
            <div onpointerdown="startSidebarDrag(event, 'Router', this)" class="p-3 w-20 flex flex-col items-center rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all cursor-grab" title="Drag to add Router">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><circle cx="12" cy="12" r="10"/><path d="m12 8-4 4h8l-4-4Z"/><path d="m12 16 4-4H8l4 4Z"/><path d="m8 12 4-4v8l-4-4Z"/><path d="m16 12-4 4V8l4 4Z"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Router</span>
            </div>
            <div onpointerdown="startSidebarDrag(event, 'AP', this)" class="p-3 w-20 flex flex-col items-center rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all cursor-grab" title="Drag to add Access Point">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="M12 20h.01"/><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">AP</span>
            </div>
            <div onpointerdown="startSidebarDrag(event, 'Laptop', this)" class="p-3 w-20 flex flex-col items-center rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all cursor-grab" title="Drag to add Laptop">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Laptop</span>
            </div>

            <div class="flex-1"></div>
            <button onclick="clearNetwork()" class="p-3 w-20 flex flex-col items-center rounded-xl text-red-400 hover:bg-slate-800 hover:text-red-300 transition-all" title="Clear Network">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                <span class="text-[10px] font-bold uppercase tracking-wide">Clear</span>
            </button>
        </div>

        <!-- Main UI Overlay Container -->
        <div class="flex-1 relative" id="ui-layer">
            
            <!-- Text Labels Container (mapped to 3D coords) -->
            <div id="html-labels-container" class="absolute inset-0 pointer-events-none"></div>

            <!-- Floating Network Console -->
            <div id="floating-console" class="absolute top-4 left-4 w-80 bg-slate-900 rounded-lg shadow-2xl flex flex-col border border-slate-700 overflow-hidden transition-transform duration-300 pointer-events-auto">
                <div class="px-3 py-2 bg-slate-800 flex justify-between items-center panel-header" onpointerdown="initPanelDrag(event, 'floating-console')">
                    <div class="flex items-center space-x-2 pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                        <span class="text-xs font-semibold text-slate-300 tracking-wider">NETWORK CONSOLE</span>
                    </div>
                    <button onclick="toggleConsole()" class="p-2 hover:bg-slate-700 rounded transition-colors -mr-2 cursor-pointer pointer-events-auto">
                        <svg id="console-chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-300 -rotate-90"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                </div>
                <div id="console-output" class="h-32 overflow-y-auto p-3 text-xs font-mono text-green-400 space-y-1 select-text hidden pointer-events-auto">
                    <div>> 3D Engine initialised.</div>
                </div>
            </div>

            <!-- STP Toggle Button -->
            <div class="absolute top-4 left-[344px] pointer-events-auto">
                <button id="btn-stp" onclick="toggleSTP()" class="px-6 py-3 bg-slate-800 text-slate-300 font-bold text-sm rounded-lg shadow-lg border border-slate-700 hover:bg-slate-700 hover:text-white transition-colors flex items-center">
                    <span>STP: OFF</span>
                </button>
            </div>

            <!-- Bottom Left Toolbar -->
            <div id="bottom-toolbar" class="absolute bottom-6 left-6 flex items-center space-x-2 bg-slate-900 p-2 rounded-xl shadow-2xl border border-slate-700 pointer-events-auto transition-transform duration-300">
                <button onclick="setMode('addText')" id="btn-addText" class="p-3 text-slate-400 rounded-lg hover:bg-slate-700 hover:text-white transition-colors" title="Add Text Annotation">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 6.1H3"/><path d="M21 12.1H3"/><path d="M15.1 18H3"/></svg>
                </button>
                <div class="w-px h-8 bg-slate-700 mx-1"></div>
                
                <!-- TRUE WEBXR IMMERSIVE TOGGLE -->
                <button onclick="toggleWebXR()" id="btn-xr" class="p-3 text-slate-400 rounded-lg hover:bg-slate-700 hover:text-cyan-400 transition-colors" title="Enter 3D WebXR Immersive">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a2 2 0 0 1-.006 2.163A11.967 11.967 0 0 1 12 19c-3.14 0-5.99-1.21-8.15-3.197"/><path d="M2.583 13.085a2 2 0 0 1 .006-2.167A11.967 11.967 0 0 1 12 5c3.14 0 5.99 1.21 8.15 3.197"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <div class="w-px h-8 bg-slate-700 mx-1"></div>

                <button onclick="saveTopology()" class="p-3 text-slate-400 rounded-lg hover:bg-slate-700 hover:text-white transition-colors" title="Save Topology">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                </button>
                <button onclick="document.getElementById('file-upload').click()" class="p-3 text-slate-400 rounded-lg hover:bg-slate-700 hover:text-white transition-colors" title="Load Topology">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                </button>
                <input type="file" id="file-upload" class="hidden" accept=".json" onchange="loadTopology(event)">
            </div>

            <!-- Floating Ping Tool -->
            <div id="floating-ping" class="absolute top-4 right-4 w-80 bg-white rounded-xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.3)] flex flex-col border border-slate-200 overflow-hidden transition-transform duration-300 pointer-events-auto">
                <div class="px-4 py-3 bg-slate-100 border-b border-slate-200 flex justify-between items-center panel-header" onpointerdown="initPanelDrag(event, 'floating-ping')">
                    <h3 class="text-xs font-bold text-slate-700 uppercase tracking-wider flex items-center space-x-2 pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                        <span>Ping Tool</span>
                    </h3>
                </div>
                <div class="p-4 bg-white space-y-3 pointer-events-auto">
                    <div class="flex flex-col space-y-2">
                        <select id="ping-source" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 cursor-pointer">
                            <option value="">Select Source...</option>
                        </select>
                        <select id="ping-target" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 cursor-pointer">
                            <option value="">Select Destination...</option>
                        </select>
                    </div>
                    <button onclick="executePing()" class="w-full py-2 bg-slate-800 text-white rounded-lg text-sm font-semibold hover:bg-slate-700 transition shadow-sm">Send Ping</button>
                </div>
            </div>
            
            <!-- Floating Properties Panel -->
            <div id="floating-properties" class="hidden absolute top-48 right-4 w-[340px] bg-white rounded-xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.3)] flex flex-col border border-slate-200 max-h-[calc(100vh-10rem)] transition-transform duration-300 pointer-events-auto">
                <div class="px-4 py-3 bg-slate-100 border-b border-slate-200 flex justify-between items-center panel-header rounded-t-xl" onpointerdown="initPanelDrag(event, 'floating-properties')">
                    <h2 id="prop-title" class="text-sm font-bold text-slate-700 uppercase tracking-wider flex items-center space-x-2 pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                        <span>Properties</span>
                    </h2>
                    <button onclick="closeProperties()" class="p-2 -mr-2 text-slate-400 hover:text-slate-800 hover:bg-slate-200 rounded transition-colors cursor-pointer pointer-events-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
                <div class="flex-1 overflow-y-auto p-5 bg-white rounded-b-xl pointer-events-auto" id="properties-panel"></div>
            </div>

            <!-- Port Selector Menu -->
            <div id="port-selector" class="hidden absolute bg-slate-900 text-white rounded-lg shadow-2xl border border-slate-700 z-50 py-1 text-sm font-mono min-w-[120px] overflow-hidden pointer-events-auto">
            </div>
        </div>
    </div>

    <script>
        // --- Core State & Models ---
        let devices = {};
        let links = {};
        let labels = {}; 
        let currentMode = 'select'; 
        let selectedDeviceId = null;
        let selectedLabelId = null;
        let pendingCableSource = null;
        let pendingCableSourcePort = null;
        let deviceCounter = { PC: 1, Switch: 1, Router: 1, AP: 1, Laptop: 1 };
        let stpEnabled = false;
        let maxZIndex = 40; 
        
        // Interaction State
        let ghostEl = null;
        let dragType = null;
        let activePanel = null;
        let panelDragOffset = { x: 0, y: 0 };
        let isPanning = false;
        let lastPanMouse = { x: 0, y: 0 };
        let dragInfo = null; // 3D drag info

        const CONSOLE = document.getElementById('console-output');
        const PROP_PANEL = document.getElementById('properties-panel');
        const HTML_LABELS = document.getElementById('html-labels-container');

        // --- THREE.JS ENGINE SETUP ---
        const canvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        // Setup initial 2D-like perspective camera looking down
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 10, 10000);
        
        // Coordinate mapping: 3D X maps to 2D X. 3D Z maps to 2D Y.
        camera.position.set(window.innerWidth / 2, 1800, window.innerHeight / 2);
        camera.lookAt(window.innerWidth / 2, 0, window.innerHeight / 2);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // Premium Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(200, 1000, 200);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 2500;
        dirLight.shadow.camera.left = -1000;
        dirLight.shadow.camera.right = 1000;
        dirLight.shadow.camera.top = 1000;
        dirLight.shadow.camera.bottom = -1000;
        scene.add(dirLight);

        // Network Object Group (to scale/move easily in VR)
        const networkGroup = new THREE.Group();
        scene.add(networkGroup);

        // Invisible Floor Plane for 3D Raycasting Drop targets
        const floorGeo = new THREE.PlaneGeometry(10000, 10000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 1 });
        const floorPlane = new THREE.Mesh(floorGeo, floorMat);
        floorPlane.rotation.x = -Math.PI / 2;
        floorPlane.receiveShadow = true;
        // Floor is slightly visible on desktop, invisible in XR
        networkGroup.add(floorPlane);

        // Temporary 3D objects storage mapping
        const deviceMeshes = {};
        const linkMeshes = {};
        const packetAnimations = [];
        let pendingLineMesh = null;

        // --- DYNAMIC TEXTURE GENERATOR (2.5D Aesthetic) ---
        function createDeviceTexture(type, name, isSelected, isPending) {
            const texCanvas = document.createElement('canvas');
            texCanvas.width = 256; texCanvas.height = 256;
            const ctx = texCanvas.getContext('2d');

            // Ceramic/Glass Base
            ctx.fillStyle = (type === 'PC' || type === 'Laptop') ? '#ffffff' : '#1e293b';
            ctx.beginPath(); ctx.roundRect(16, 16, 224, 224, 40); ctx.fill();

            // Glow outlines
            if (isSelected) { ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 16; ctx.stroke(); }
            else if (isPending) { ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 16; ctx.stroke(); }
            else { ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 4; ctx.stroke(); }

            ctx.fillStyle = (type === 'PC' || type === 'Laptop') ? '#64748b' : '#f8fafc';
            // Draw simple geometric icons 
            if (type === 'Switch') {
                ctx.fillRect(50, 90, 156, 40);
            } else if (type === 'Router') {
                ctx.beginPath(); ctx.arc(128, 110, 45, 0, Math.PI*2); ctx.fill();
            } else if (type === 'PC') {
                ctx.fillRect(80, 60, 96, 64); ctx.fillRect(100, 130, 56, 12);
            } else if (type === 'AP') {
                ctx.beginPath(); ctx.arc(128, 120, 30, 0, Math.PI, true); ctx.fill();
                ctx.fillRect(120, 120, 16, 40);
            } else if (type === 'Laptop') {
                ctx.fillRect(50, 140, 156, 16); ctx.fillRect(70, 70, 116, 65);
            }

            // Name
            ctx.fillStyle = (type === 'PC' || type === 'Laptop') ? '#1e293b' : '#f8fafc';
            ctx.font = 'bold 32px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(name, 128, 210);

            const texture = new THREE.CanvasTexture(texCanvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createPortLabelTexture(text, isDown) {
            const c = document.createElement('canvas');
            c.width = 128; c.height = 64;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.roundRect(10, 10, 108, 44, 10); ctx.fill();
            ctx.lineWidth = 4; ctx.strokeStyle = isDown ? '#ef4444' : '#cbd5e1'; ctx.stroke();
            
            ctx.fillStyle = isDown ? '#94a3b8' : '#1e293b';
            ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, 64, 32);
            if (isDown) { ctx.beginPath(); ctx.moveTo(20, 32); ctx.lineTo(108, 32); ctx.strokeStyle='#ef4444'; ctx.stroke(); }
            
            return new THREE.CanvasTexture(c);
        }

        // --- TRUE WEBXR: DOM OVERLAY LOGIC ---
        let xrSession = null;

        async function initWebXR() {
            if (!navigator.xr) { log("WebXR is not supported in this browser.", "error"); return; }
            try {
                const isSupported = await navigator.xr.isSessionSupported('immersive-ar');
                if (!isSupported) { log("Immersive AR is not supported on this device.", "error"); return; }

                xrSession = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['dom-overlay'],
                    optionalFeatures: ['local-floor', 'local', 'hand-tracking'],
                    domOverlay: { root: document.getElementById('app-container') }
                });

                xrSession.addEventListener('end', onXREnded);
                
                xrSession.addEventListener('inputsourceschange', (e) => {
                    e.added.forEach(source => {
                        if (source.hand) log("XR Hand Tracking active.", "success");
                        else if (source.targetRayMode === 'tracked-pointer') log("XR Controller active.", "info");
                    });
                });

                // Attach session to ThreeJS
                renderer.xr.enabled = true;

                html += `<div class="space-y-3"><div><label class="block text-xs font-semibold text-slate-500 mb-1">IP Address</label><input type="text" id="prop-ip" value="${dev.ip}" autocomplete="off" autocorrect="off" spellcheck="false" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 pointer-events-auto cursor-text"></div><div><label class="block text-xs font-semibold text-slate-500 mb-1">Subnet Mask</label><input type="text" id="prop-sub" value="${dev.subnet}" autocomplete="off" autocorrect="off" spellcheck="false" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 pointer-events-auto cursor-text"></div><div><label class="block text-xs font-semibold text-slate-500 mb-1">Default Gateway</label><input type="text" id="prop-gw" value="${dev.gateway}" autocomplete="off" autocorrect="off" spellcheck="false" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 pointer-events-auto cursor-text"></div><button onclick="savePCSettings('${dev.id}')" id="btn-save-pc" class="w-full py-3 mt-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-bold transition-colors shadow-sm pointer-events-auto cursor-pointer">Save Settings</button></div>`;
                if (dev.type === 'Laptop') { html += `<div class="pt-4 border-t mt-4 space-y-3 bg-cyan-50/50 p-4 rounded-lg border border-cyan-100"><div class="flex items-center justify-between"><h3 class="text-sm font-semibold text-cyan-800">Wi-Fi Connection</h3><span class="text-[9px] font-bold px-2 py-1 rounded-full ${dev.connectedApId ? 'bg-green-100 text-green-700' : 'bg-slate-200 text-slate-500'}">${dev.connectedApId ? 'CONNECTED' : 'DISCONNECTED'}</span></div><div class="text-[10px] text-cyan-700 mb-1 leading-tight">Enter credentials and save settings to auto-connect.</div><div><input type="text" id="prop-wifi-ssid" value="${dev.ssid}" placeholder="SSID" autocomplete="off" autocorrect="off" spellcheck="false" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 bg-white mb-2 pointer-events-auto cursor-text"><input type="text" id="prop-wifi-pass" value="${dev.password}" placeholder="Password" autocomplete="off" autocorrect="off" spellcheck="false" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 bg-white pointer-events-auto cursor-text"></div></div>`; }
                html += `<div class="pt-4 border-t mt-4"><div class="flex justify-between items-center mb-2"><h3 class="text-sm font-semibold text-slate-700">ARP Cache</h3><button onclick="clearARP('${dev.id}')" class="text-xs text-blue-500 hover:bg-blue-50 px-3 py-1 rounded transition pointer-events-auto cursor-pointer">Clear</button></div><div class="bg-slate-50 border rounded-lg text-xs font-mono max-h-32 overflow-y-auto pointer-events-auto"><table class="w-full text-left"><thead class="bg-slate-200 text-slate-600 sticky top-0"><tr><th class="px-3 py-2">IP</th><th class="px-3 py-2">MAC</th></tr></thead><tbody>${Object.entries(dev.arpCache).map(([ip, mac]) => `<tr><td class="px-3 py-2 border-t">${ip}</td><td class="px-3 py-2 border-t">${mac}</td></tr>`).join('') || '<tr><td colspan="2" class="px-3 py-3 text-center text-slate-400">Cache empty</td></tr>'}</tbody></table></div></div>`;
            } else if (dev.type === 'Router') {
                html += `<div class="space-y-4"><div><div class="flex items-center justify-between mb-2"><h3 class="text-sm font-semibold text-slate-700">Interfaces</h3></div><div class="space-y-3">${Object.values(dev.interfaces).map(iface => `<div class="p-3 bg-slate-50 border rounded-lg text-xs relative ${iface.adminState==='down'?'opacity-60':''}"><div class="font-bold text-slate-700 mb-2 flex justify-between items-center"><span>${iface.id}</span><span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${iface.adminState==='up'?'bg-emerald-100 text-emerald-700':'bg-slate-200 text-slate-500'}">${iface.adminState.toUpperCase()}</span></div><div class="flex space-x-2"><input type="text" id="prop-ip-${iface.id.replace(/\//g,'-')}" value="${iface.ip}" placeholder="IP" autocomplete="off" autocorrect="off" spellcheck="false" class="w-1/2 px-2 py-2 border rounded focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white pointer-events-auto cursor-text"><input type="text" id="prop-sub-${iface.id.replace(/\//g,'-')}" value="${iface.subnet}" placeholder="Subnet" autocomplete="off" autocorrect="off" spellcheck="false" class="w-1/2 px-2 py-2 border rounded focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white pointer-events-auto cursor-text"></div></div>`).join('')}</div></div><label class="flex items-center space-x-3 bg-slate-50 p-3 rounded-lg border pointer-events-auto cursor-pointer"><input type="checkbox" id="prop-rip" ${dev.ripEnabled ? 'checked' : ''} class="w-5 h-5 text-blue-600 rounded cursor-pointer pointer-events-auto"><span class="text-sm font-semibold text-slate-700 cursor-pointer">Enable RIPv2 Routing</span></label><button onclick="saveRouterSettings('${dev.id}')" id="btn-save-router" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-bold transition-colors shadow-sm pointer-events-auto cursor-pointer">Save Router Config</button><div class="pt-3 border-t mt-4"><div class="flex justify-between items-center mb-2"><h3 class="text-sm font-semibold text-slate-700">Routing Table</h3></div><div class="bg-slate-50 border rounded-lg text-[10px] font-mono max-h-40 overflow-y-auto pointer-events-auto"><table class="w-full text-left"><thead class="bg-slate-200 text-slate-600 sticky top-0"><tr><th class="px-2 py-2">T</th><th class="px-2 py-2">Net/Mask</th><th class="px-2 py-2">Next Hop</th><th class="px-2 py-2">Iface</th><th class="px-2 py-2">Met</th></tr></thead><tbody>${dev.routingTable.length === 0 ? '<tr><td colspan="5" class="px-2 py-3 text-center text-slate-400">Table empty</td></tr>' : dev.routingTable.map(r => `<tr><td class="px-2 py-2 border-t font-bold ${r.type==='C'?'text-blue-600':'text-orange-500'}">${r.type}</td><td class="px-2 py-2 border-t">${r.network}/${getPrefixLength(r.mask)}</td><td class="px-2 py-2 border-t">${r.nextHop}</td><td class="px-2 py-2 border-t">${r.interface}</td><td class="px-2 py-2 border-t">${r.metric}</td></tr>`).join('')}</tbody></table></div></div></div>`;
            } else if (dev.type === 'AP') {
                html += `<div class="space-y-4"><div><label class="block text-xs font-semibold text-slate-500 mb-1">SSID</label><input type="text" id="prop-ssid" value="${dev.ssid}" autocomplete="off" autocorrect="off" spellcheck="false" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 pointer-events-auto cursor-text"></div><div><label class="block text-xs font-semibold text-slate-500 mb-1">Band</label><select id="prop-band" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 pointer-events-auto cursor-pointer"><option value="2.4" ${dev.band === '2.4' ? 'selected' : ''}>2.4 GHz (Wider Range)</option><option value="5" ${dev.band === '5' ? 'selected' : ''}>5 GHz (Shorter Range)</option></select></div><div><label class="block text-xs font-semibold text-slate-500 mb-1">Security</label><select id="prop-sec" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 pointer-events-auto cursor-pointer"><option value="WPA" ${dev.security === 'WPA' ? 'selected' : ''}>WPA</option><option value="WPA2" ${dev.security === 'WPA2' ? 'selected' : ''}>WPA2</option></select></div><div><label class="block text-xs font-semibold text-slate-500 mb-1">Password</label><input type="text" id="prop-pass" value="${dev.password}" placeholder="Optional" autocomplete="off" autocorrect="off" spellcheck="false" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 pointer-events-auto cursor-text"></div><div class="pt-3 border-t"><h3 class="text-sm font-semibold text-slate-700 mb-2">Port Status</h3><ul class="text-sm mt-1 space-y-2 pointer-events-auto">${dev.ports.map(p => { const link = p.connectedLink ? links[p.connectedLink] : null; const nDev = link ? devices[link.source === dev.id ? link.target : link.source] : null; const statusColor = p.adminState === 'down' ? 'text-slate-400 bg-slate-100' : 'text-green-700 bg-green-100'; const statusText = p.adminState === 'down' ? 'DOWN' : (link ? 'UP' : 'DISCONNECTED'); const connText = nDev ? ` (→ ${nDev.name})` : ''; return `<li class="flex items-center justify-between"><span>Fa0/${p.id}${connText}</span> <span class="${statusColor} px-2 py-0.5 rounded-full font-bold text-[10px] tracking-wider">${statusText}</span></li>`; }).join('')}</ul></div><button onclick="saveAPSettings('${dev.id}')" id="btn-save-ap" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-bold transition-colors shadow-sm pointer-events-auto cursor-pointer">Save AP Config</button></div>`;
            } else if (dev.type === 'Switch') {
                html += `<div class="pt-2"><div class="flex justify-between items-center mb-2"><h3 class="text-sm font-semibold text-slate-700">MAC Address Table</h3><button onclick="clearMACTable('${dev.id}')" class="text-xs text-blue-500 hover:bg-blue-50 px-3 py-1 rounded transition pointer-events-auto cursor-pointer">Clear</button></div><div class="bg-slate-50 border rounded-lg text-xs font-mono max-h-48 overflow-y-auto pointer-events-auto"><table class="w-full text-left"><thead class="bg-slate-200 text-slate-600 sticky top-0"><tr><th class="px-3 py-2">MAC</th><th class="px-3 py-2">Port</th><th class="px-3 py-2">Age(s)</th></tr></thead><tbody>${Object.entries(dev.macTable).map(([mac, data]) => { const age = Math.floor((Date.now() - data.time)/1000); return `<tr><td class="px-3 py-2 border-t">${mac}</td><td class="px-3 py-2 border-t">${data.portId}</td><td class="px-3 py-2 border-t">${age}</td></tr>`; }).join('') || '<tr><td colspan="3" class="px-3 py-3 text-center text-slate-400">Table empty</td></tr>'}</tbody></table></div></div><div class="pt-4 mt-4 border-t"><h3 class="text-sm font-semibold text-slate-700 mb-1">STP Status</h3><p class="text-xs text-slate-500 mb-2">Root Bridge: <span class="font-mono font-bold">${devices[dev.stp.rootBridge]?.name || 'Unknown'}</span></p><ul class="text-sm space-y-2 pointer-events-auto">${dev.ports.filter(p=>p.connectedLink).map(p => { const link = links[p.connectedLink]; const nId = link.source === dev.id ? link.target : link.source; const nDev = devices[nId]; const statusColor = p.adminState === 'down' ? 'text-slate-500 bg-slate-100' : (p.stpState === 'blocking' ? 'text-red-700 bg-red-100' : 'text-green-700 bg-green-100'); const statusText = p.adminState === 'down' ? 'DOWN' : p.stpState.toUpperCase(); return `<li class="flex items-center justify-between"><span>Port ${p.id} (→ ${nDev.name})</span> <span class="${statusColor} px-2 py-0.5 rounded-full font-bold text-[10px] tracking-wider">${statusText}</span></li>`; }).join('')}</ul></div>`;
            }
            html += `</div>`; PROP_PANEL.innerHTML = html;
        }

        window.updateLabelProp = (prop, val) => { if (selectedLabelId && labels[selectedLabelId]) { labels[selectedLabelId][prop] = val; updateHTMLOverlays(); } };
        window.savePCSettings = (id) => { const dev = devices[id]; if (!dev || (dev.type !== 'PC' && dev.type !== 'Laptop')) return; dev.ip = document.getElementById('prop-ip').value; dev.subnet = document.getElementById('prop-sub').value; dev.gateway = document.getElementById('prop-gw').value; if (dev.type === 'Laptop') { dev.ssid = document.getElementById('prop-wifi-ssid').value; dev.password = document.getElementById('prop-wifi-pass').value; window.evaluateWifiConnections(); } triggerHaptic(0.3, 30); const btn = document.getElementById('btn-save-pc'); if (btn) { btn.textContent = 'Saved Successfully!'; btn.classList.replace('bg-blue-600', 'bg-emerald-500'); btn.classList.replace('hover:bg-blue-500', 'hover:bg-emerald-400'); setTimeout(() => { if (document.getElementById('btn-save-pc') === btn) { btn.textContent = 'Save Settings'; btn.classList.replace('bg-emerald-500', 'bg-blue-600'); btn.classList.replace('hover:bg-emerald-400', 'hover:bg-blue-500'); } }, 1500); } log(`[${dev.name}] Configuration saved.`); updatePingDropdown(); };
        window.saveAPSettings = (id) => { const dev = devices[id]; if (!dev || dev.type !== 'AP') return; dev.ssid = document.getElementById('prop-ssid').value; dev.band = document.getElementById('prop-band').value; dev.security = document.getElementById('prop-sec').value; dev.password = document.getElementById('prop-pass').value; window.evaluateWifiConnections(); triggerHaptic(0.3, 30); const btn = document.getElementById('btn-save-ap'); if (btn) { btn.textContent = 'Saved Successfully!'; btn.classList.replace('bg-blue-600', 'bg-emerald-500'); btn.classList.replace('hover:bg-blue-500', 'hover:bg-emerald-400'); setTimeout(() => { if (document.getElementById('btn-save-ap') === btn) { btn.textContent = 'Save AP Config'; btn.classList.replace('bg-emerald-500', 'bg-blue-600'); btn.classList.replace('hover:bg-emerald-400', 'hover:bg-blue-500'); } }, 1500); } log(`[${dev.name}] AP configuration saved.`); renderNodes(); };
        window.saveRouterSettings = (id) => { const dev = devices[id]; if (!dev || dev.type !== 'Router') return; Object.values(dev.interfaces).forEach(iface => { const ipInput = document.getElementById(`prop-ip-${iface.id.replace(/\//g,'-')}`); const subInput = document.getElementById(`prop-sub-${iface.id.replace(/\//g,'-')}`); if (ipInput && subInput) { iface.ip = ipInput.value; iface.subnet = subInput.value; } }); dev.ripEnabled = document.getElementById('prop-rip').checked; dev.updateConnectedRoutes(); dev.ripBroadcastCount = 0; log(`[${dev.name}] Router configuration saved.`); if (selectedDeviceId === dev.id) updatePropertiesPanel(); updatePingDropdown(); triggerHaptic(0.3, 30); const btn = document.getElementById('btn-save-router'); if (btn) { btn.textContent = 'Saved Successfully!'; btn.classList.replace('bg-blue-600', 'bg-emerald-500'); btn.classList.replace('hover:bg-blue-500', 'hover:bg-emerald-400'); setTimeout(() => { const currentBtn = document.getElementById('btn-save-router'); if (currentBtn) { currentBtn.textContent = 'Save Router Config'; currentBtn.classList.replace('bg-emerald-500', 'bg-blue-600'); currentBtn.classList.replace('hover:bg-emerald-400', 'hover:bg-blue-500'); } }, 1500); } };
        window.clearARP = (id) => { devices[id].arpCache = {}; updatePropertiesPanel(); triggerHaptic(0.2, 20); };
        window.clearMACTable = (id) => { devices[id].macTable = {}; updatePropertiesPanel(); triggerHaptic(0.2, 20); };

        setInterval(() => { if (selectedDeviceId && devices[selectedDeviceId].type === 'Switch') updatePropertiesPanel(); }, 5000);
        setInterval(() => { Object.values(devices).filter(d => d.type === 'Router' && d.ripEnabled).forEach(router => { router.updateConnectedRoutes(); if (router.routingTable.length === 0) return; router.ripBroadcastCount++; const isSilent = router.ripBroadcastCount > 3; Object.values(router.interfaces).forEach(iface => { if (iface.ip !== '0.0.0.0' && iface.adminState === 'up' && iface.connectedLink) { transmit({ sourceMac: iface.mac, destMac: '01:00:5E:00:00:09', payload: { type: 'RIP_UPDATE', sourceIp: iface.ip, routes: router.routingTable }, ttl: 1, silent: isSilent }, router.id, iface.id); } }); }); }, 10000);

        window.executePing = async () => {
            const sourceId = document.getElementById('ping-source').value; const targetIp = document.getElementById('ping-target').value; triggerHaptic(0.2, 20);
            if (!sourceId) { log(`Ping Error: Please select a source PC.`, 'error'); return; }
            if (!targetIp) { log(`Ping Error: Please select a destination device.`, 'error'); return; }
            if (targetIp === '0.0.0.0') { log(`Ping Error: Destination device has no valid IP configured.`, 'error'); return; }

            const pc = devices[sourceId];
            if (!pc.port) { log(`[${pc.name}] Network cable unplugged.`, 'error'); return; }
            log(`[${pc.name}] Pinging ${targetIp} with 32 bytes of data:`, 'info');

            let destIp = isSameSubnet(pc.ip, targetIp, pc.subnet) ? targetIp : pc.gateway;
            if (destIp === '0.0.0.0' || !destIp) { log(`[${pc.name}] Reply from ${pc.ip}: Destination host unreachable.`, 'error'); return; }

            let targetMac = pc.arpCache[destIp];
            if (!targetMac) {
                log(`[${pc.name}] Destination MAC unknown. Broadcasting ARP Request...`, 'warning');
                let arpResolved = false; const arpHandler = (e) => { if (e.detail.ip === destIp) arpResolved = true; };
                document.addEventListener('arp_resolved', arpHandler, { once: true });
                transmit({ sourceMac: pc.mac, destMac: 'FF:FF:FF:FF:FF:FF', payload: { type: 'ARP_REQ', sourceIp: pc.ip, targetIp: destIp } }, pc.id, 1);
                for(let i=0; i<100; i++) { await sleep(100); if (arpResolved) break; }
                document.removeEventListener('arp_resolved', arpHandler);
                targetMac = pc.arpCache[destIp];
                if (!targetMac) { log(`[${pc.name}] ARP Request timed out.`, 'error'); triggerHaptic(0.5, 100); return; }
            }

            let icmpReplied = false; const icmpHandler = () => icmpReplied = true;
            document.addEventListener('icmp_replied', icmpHandler, { once: true });
            transmit({ sourceMac: pc.mac, destMac: targetMac, payload: { type: 'ICMP_REQ', sourceIp: pc.ip, targetIp: targetIp } }, pc.id, 1);
            for(let i=0; i<100; i++) { await sleep(100); if (icmpReplied) break; }
            document.removeEventListener('icmp_replied', icmpHandler);
            if (!icmpReplied) { log(`[${pc.name}] Request timed out.`, 'error'); triggerHaptic(0.5, 100); } else showSuccessTick(pc.id);
        };

        window.clearNetwork = () => { devices = {}; links = {}; labels = {}; selectedDeviceId = null; selectedLabelId = null; pendingCableSource = null; pendingCableSourcePort = null; deviceCounter = { PC: 1, Switch: 1, Router: 1, AP: 1, Laptop: 1 }; CONSOLE.innerHTML = '<div>> Network cleared.</div>'; hidePortSelector(); renderNodes(); renderLinks(); updatePropertiesPanel(); triggerHaptic(0.6, 60); };

        window.saveTopology = () => { const data = { devices, links, labels, deviceCounter, stpEnabled }; const blob = new Blob([JSON.stringify(data)], {type: "application/json"}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'network_topology.json'; a.click(); URL.revokeObjectURL(url); };
        window.loadTopology = (event) => { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { try { const data = JSON.parse(e.target.result); devices = {}; for (let id in data.devices) { const d = data.devices[id]; let instance; if (d.type === 'PC') instance = new PC(d.x, d.y); else if (d.type === 'Laptop') instance = new Laptop(d.x, d.y); else if (d.type === 'Switch') instance = new Switch(d.x, d.y); else if (d.type === 'Router') instance = new Router(d.x, d.y); else if (d.type === 'AP') instance = new AccessPoint(d.x, d.y); Object.assign(instance, d); devices[id] = instance; } links = data.links || {}; labels = data.labels || {}; deviceCounter = { PC: 1, Switch: 1, Router: 1, AP: 1, Laptop: 1, ...(data.deviceCounter || {}) }; if (data.stpEnabled !== undefined && data.stpEnabled !== stpEnabled) toggleSTP(); selectedDeviceId = null; selectedLabelId = null; pendingCableSource = null; pendingCableSourcePort = null; flushMacTables(); renderNodes(); if (stpEnabled) calculateSTP(); else renderLinks(); updatePropertiesPanel(); } catch (err) {} }; reader.readAsText(file); event.target.value = ''; };

        // Initialization
        renderNodes();
    </script>
</body>
</html>
